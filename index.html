<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Diário do Bebê">
<meta name="theme-color" content="#0d1b2a">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="icon-192.png">
<title>Diário do Bebê</title>
<style>
  :root{
    --bg:#0d1b2a; --bg2:#0a1622; --card:#16263a; --card2:#1d3148;
    --ink:#eef4fb; --muted:#8ea6c0; --line:#26405b;
    --accent:#4f9dff; --accent-d:#3f86e0; --accent-soft:#bcd8ff;
    --sono:#6fa8ff; --sononoite:#8a9bff; --mamada:#e6a866; --refeicao:#86cf73; --despertar:#c79be0;
    --bad:#e5705f; --ok:#e0b056; --mid:#9fce6a; --good:#62c46f;
    --shadow:0 2px 10px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) 0 env(safe-area-inset-left);
    max-width:560px; margin:0 auto; min-height:100vh;
    background-image:radial-gradient(900px 360px at 50% -8%, #16335a 0%, rgba(13,27,42,0) 70%);
    background-attachment:fixed;
  }
  header{padding:16px 16px 10px; position:sticky; top:0; z-index:5; background:linear-gradient(180deg,var(--bg) 72%,rgba(13,27,42,0))}
  .head-row{display:flex; align-items:center; gap:12px}
  .avatar{width:50px; height:50px; border-radius:50%; flex-shrink:0; object-fit:cover; background:var(--card2); border:2px solid var(--accent); display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:700; color:var(--accent-soft); overflow:hidden}
  .head-txt{flex:1; min-width:0}
  .head-txt .greet{font-size:12.5px; color:var(--muted)}
  .head-txt .name{font-size:19px; font-weight:700; line-height:1.15; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .gear{background:none; border:none; font-size:20px; cursor:pointer; padding:4px; color:var(--muted)}
  .wrap{padding:0 16px 120px}

  .tabs{position:fixed; bottom:0; left:0; right:0; max-width:560px; margin:0 auto; display:flex; background:var(--bg2); border-top:1px solid var(--line); padding:6px 6px calc(6px + env(safe-area-inset-bottom)); z-index:10}
  .tabs button{flex:1; background:none; border:none; padding:8px 2px; font-size:11px; color:var(--muted); display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer; font-weight:600}
  .tabs button .ic{font-size:21px; line-height:1}
  .tabs button.active{color:var(--accent)}

  .view{display:none} .view.active{display:block}

  .resumo{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin:4px 0 18px}
  .resumo .r{background:var(--card); border-radius:14px; padding:10px 6px; text-align:center; box-shadow:var(--shadow); border:1px solid var(--line)}
  .resumo .r .n{font-size:21px; font-weight:700; line-height:1; color:var(--ink)}
  .resumo .r .l{font-size:10px; color:var(--muted); margin-top:4px}

  .section-t{font-size:12px; color:var(--muted); font-weight:700; text-transform:uppercase; letter-spacing:.05em; margin:18px 2px 10px}

  .ongoing{border-radius:16px; padding:14px 16px; margin-bottom:10px; display:flex; align-items:center; gap:12px; box-shadow:var(--shadow); color:#fff}
  .ongoing.soneca{background:linear-gradient(135deg,#2f6dc0,#1c4f9e)}
  .ongoing.sono{background:linear-gradient(135deg,#3b3f9e,#272a73)}
  .ongoing.despertar{background:linear-gradient(135deg,#7b4f9e,#5a3475)}
  .ongoing.mamada{background:linear-gradient(135deg,#b9742f,#8a531d)}
  .ongoing .txt{flex:1}
  .ongoing .txt .a{font-size:13px; opacity:.9}
  .ongoing .txt .b{font-size:19px; font-weight:700; margin-top:2px}
  .ongoing button{background:#fff; color:#1c2a52; border:none; border-radius:12px; padding:11px 14px; font-size:14px; font-weight:700; cursor:pointer; white-space:nowrap}

  .actions{display:grid; grid-template-columns:1fr 1fr; gap:12px}
  .act{background:var(--card); border:1.5px solid var(--line); border-radius:18px; padding:18px 14px; display:flex; flex-direction:column; align-items:flex-start; gap:6px; cursor:pointer; box-shadow:var(--shadow); transition:transform .06s ease; text-align:left; width:100%; color:var(--ink)}
  .act:active{transform:scale(.97)}
  .act .ico{font-size:30px; line-height:1}
  .act .nm{font-size:16px; font-weight:700}
  .act .ds{font-size:12px; color:var(--muted)}
  .act.full{grid-column:1 / -1; flex-direction:row; align-items:center; gap:14px}
  .act.full .ico{font-size:28px}
  .act.sona{border-color:#2d5488} .act.sono{border-color:#34388a} .act.mamada{border-color:#6b4f2e}
  .act.refeicao{border-color:#37562c} .act.despertar{border-color:#553a63}
  .act.on{outline:2px solid var(--accent); outline-offset:0}

  .day-h{font-size:13px; font-weight:700; color:var(--accent-soft); margin:18px 2px 8px; display:flex; align-items:center; gap:8px}
  .day-h .cnt{font-size:11px; color:var(--muted); font-weight:600}
  .ev{background:var(--card); border-radius:14px; padding:11px 13px; margin-bottom:8px; display:flex; align-items:center; gap:11px; box-shadow:var(--shadow); border:1px solid var(--line)}
  .ev .dot{width:34px; height:34px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0}
  .ev .info{flex:1; min-width:0}
  .ev .info .t1{font-size:14.5px; font-weight:600}
  .ev .info .t2{font-size:12px; color:var(--muted); margin-top:1px}
  .ev .time{font-size:13px; color:var(--muted); font-variant-numeric:tabular-nums; white-space:nowrap}
  .ev .edit{background:none; border:none; color:#6f87a3; font-size:16px; padding:4px 2px 4px 6px; cursor:pointer}
  .ev .del{background:none; border:none; color:#5d728c; font-size:18px; padding:4px 2px 4px 4px; cursor:pointer}
  .badge{display:inline-block; font-size:11px; font-weight:700; padding:2px 8px; border-radius:20px; color:#0d1b2a}

  .stat-card{background:var(--card); border-radius:16px; padding:16px; margin-bottom:14px; box-shadow:var(--shadow); border:1px solid var(--line)}
  .stat-card h3{margin:0 0 3px; font-size:15px}
  .stat-card .q{font-size:12.5px; color:var(--muted); margin:0 0 14px}
  .big-num{font-size:30px; font-weight:800; color:var(--accent); line-height:1}
  .big-num small{font-size:14px; color:var(--muted); font-weight:600}
  .bar-row{display:flex; align-items:center; gap:8px; margin:7px 0; font-size:12.5px}
  .bar-row .lbl{width:42px; color:var(--muted); font-variant-numeric:tabular-nums; flex-shrink:0}
  .bar-row .track{flex:1; background:rgba(255,255,255,.07); border-radius:8px; height:18px; overflow:hidden; position:relative}
  .bar-row .fill{height:100%; border-radius:8px; min-width:2px}
  .bar-row .val{width:60px; text-align:right; color:var(--ink); font-weight:600; flex-shrink:0; font-variant-numeric:tabular-nums}
  .hint{font-size:12px; color:var(--muted); margin-top:10px; line-height:1.5}
  .hint b{color:var(--accent-soft)}
  .empty{text-align:center; color:var(--muted); padding:40px 20px; font-size:14px}
  .empty .ico{font-size:40px; display:block; margin-bottom:10px; opacity:.7}

  #installbar{display:flex; align-items:center; gap:10px; margin:0 16px 8px; padding:11px 14px; background:linear-gradient(135deg,#2f6dc0,#1c4f9e); border-radius:14px; box-shadow:var(--shadow); color:#fff}
  #installbar .ib-txt{flex:1; font-size:13.5px; font-weight:600}
  #installbar .ib-btn{background:#fff; color:#1c2a52; border:none; border-radius:10px; padding:9px 14px; font-size:13.5px; font-weight:700; cursor:pointer}
  #installbar .ib-x{background:none; border:none; color:#dce8ff; font-size:16px; cursor:pointer; padding:2px 4px}

  .period-seg{display:flex; gap:4px; background:var(--card); border:1px solid var(--line); border-radius:13px; padding:4px; margin:2px 0 16px; position:sticky; top:62px; z-index:4; box-shadow:var(--shadow)}
  .period-seg button{flex:1; background:none; border:none; color:var(--muted); font-size:13px; font-weight:700; padding:9px 4px; border-radius:10px; cursor:pointer; font-family:inherit}
  .period-seg button.active{background:var(--accent); color:#06121f}
  .chart-box{position:relative; height:170px; margin:6px 0 2px}
  .chart-box.tall{height:200px}
  .chart-box.mini{height:140px}
  .chart-cap{font-size:11.5px; color:var(--muted); margin:8px 2px 2px; font-weight:700; text-transform:uppercase; letter-spacing:.04em}
  .seg-row{display:flex; gap:8px; align-items:center; background:var(--card); border:1.5px solid var(--line); border-radius:12px; padding:4px; margin-top:6px}
  .seg-row button{flex:1; background:none; border:none; color:var(--muted); font-size:14px; font-weight:700; padding:11px 4px; border-radius:9px; cursor:pointer; font-family:inherit}
  .seg-row button.active{background:var(--accent); color:#06121f}

  .overlay{position:fixed; inset:0; background:rgba(5,10,18,.66); display:none; align-items:flex-end; z-index:50}
  .overlay.show{display:flex}
  .sheet{background:var(--bg2); width:100%; max-width:560px; margin:0 auto; border-radius:22px 22px 0 0; padding:18px 18px calc(20px + env(safe-area-inset-bottom)); animation:up .22s ease; border-top:1px solid var(--line)}
  @keyframes up{from{transform:translateY(40px); opacity:.4}to{transform:translateY(0); opacity:1}}
  .sheet h2{margin:2px 0 4px; font-size:18px}
  .sheet .ph{font-size:13px; color:var(--muted); margin:0 0 16px}
  .qbtns{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px}
  .qbtns.three{grid-template-columns:1fr 1fr 1fr}
  .qbtns.three .qbtn{padding:12px 4px; font-size:13.5px}
  .qbtns.three .qbtn .qe{font-size:21px}
  .qbtn{border:1.5px solid var(--line); background:var(--card); border-radius:14px; padding:14px 8px; font-size:15px; font-weight:700; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:5px; color:var(--ink)}
  .qbtn .qe{font-size:24px}
  .qbtn:active{transform:scale(.97)}
  .field{margin-bottom:14px}
  .field label{font-size:12px; color:var(--muted); font-weight:600; display:block; margin-bottom:5px}
  .field input{width:100%; border:1.5px solid var(--line); border-radius:12px; padding:12px; font-size:16px; background:var(--card); color:var(--ink); font-family:inherit}
  .field input::placeholder{color:#5d728c}
  .btn{border:none; border-radius:13px; padding:14px; font-size:15px; font-weight:700; cursor:pointer; width:100%}
  .btn.primary{background:var(--accent); color:#06121f}
  .btn.ghost{background:var(--card); color:var(--ink); border:1.5px solid var(--line)}
  .btn.danger{background:#3a1f1d; color:var(--bad)}
  .btn:disabled{opacity:.5}
  .sheet .stack{display:flex; flex-direction:column; gap:9px}

  .toast{position:fixed; bottom:90px; left:50%; transform:translateX(-50%) translateY(20px); background:#06121f; color:#fff; padding:11px 18px; border-radius:30px; font-size:13.5px; font-weight:600; opacity:0; transition:.25s; z-index:60; pointer-events:none; white-space:nowrap; box-shadow:0 6px 20px rgba(0,0,0,.5); border:1px solid var(--line)}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0)}

  #auth,#onboard{display:none; min-height:100vh; flex-direction:column; justify-content:center; padding:24px; max-width:420px; margin:0 auto}
  #auth.show,#onboard.show{display:flex}
  #auth .logo{font-size:48px; text-align:center; margin-bottom:6px}
  #auth h1{font-size:24px; text-align:center; margin:0 0 4px}
  #auth p.s{text-align:center; color:var(--muted); font-size:13.5px; margin:0 0 26px}
  .err{background:#3a1f1d; color:var(--bad); font-size:13px; padding:11px 13px; border-radius:12px; margin-bottom:12px; display:none}
  .err.show{display:block}
  #auth .toggle{text-align:center; margin-top:16px; font-size:13.5px; color:var(--muted)}
  #auth .toggle a{color:var(--accent); font-weight:700; text-decoration:none; cursor:pointer}

  #onboard h1{font-size:23px; text-align:center; margin:0 0 4px}
  #onboard p.s{text-align:center; color:var(--muted); font-size:13.5px; margin:0 0 22px}
  .ph-pick{width:120px; height:120px; border-radius:50%; margin:0 auto 8px; background:var(--card); border:2px dashed var(--line); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; cursor:pointer; overflow:hidden; color:var(--muted)}
  .ph-pick img{width:100%; height:100%; object-fit:cover}
  .ph-pick .pe{font-size:32px}
  .ph-pick .pt{font-size:11px}
  .ph-cap{text-align:center; font-size:12px; color:var(--muted); margin:0 0 20px}

  #app{display:none} #app.show{display:block}
  #boot{min-height:100vh; display:flex; align-items:center; justify-content:center; color:var(--muted); font-size:14px}
</style>
</head>
<body>

<div id="boot">Carregando…</div>

<!-- LOGIN -->
<div id="auth">
  <div class="logo">🍼</div>
  <h1>Diário do Bebê</h1>
  <p class="s" id="auth-sub">Entre pra acessar seus registros</p>
  <div class="err" id="auth-err"></div>
  <div class="field"><label>Email</label><input id="email" type="email" autocomplete="email" placeholder="seu@email.com"></div>
  <div class="field"><label>Senha</label><input id="pass" type="password" autocomplete="current-password" placeholder="mínimo 6 caracteres"></div>
  <button class="btn primary" id="auth-btn" onclick="doAuth()">Entrar</button>
  <div class="toggle" id="auth-toggle">Ainda não tem conta? <a onclick="toggleMode()">Criar conta</a></div>
</div>

<!-- ONBOARDING -->
<div id="onboard">
  <h1>Quem é o seu pequeno?</h1>
  <p class="s">Um nome e um rostinho deixam o diário mais seu.</p>
  <div class="err" id="onb-err"></div>
  <div class="ph-pick" id="phPick" onclick="document.getElementById('phInput').click()">
    <span class="pe">📷</span><span class="pt">adicionar foto</span>
  </div>
  <p class="ph-cap">opcional, fica só na sua conta</p>
  <input type="file" id="phInput" accept="image/*" style="display:none" onchange="pickPhoto(event)">
  <div class="field"><label>Nome do bebê</label><input id="onb-name" placeholder="ex: Tom" autocomplete="off"></div>
  <div class="field"><label>Seu nome (opcional)</label><input id="onb-mother" placeholder="ex: Ana" autocomplete="off"></div>
  <div class="field"><label>Data de nascimento (opcional)</label><input id="onb-birth" type="date"></div>
  <button class="btn primary" onclick="saveOnboard()">Começar</button>
</div>

<!-- APP -->
<div id="app">
<header>
  <div class="head-row">
    <div class="avatar" id="avatar" onclick="openSettings()">🍼</div>
    <div class="head-txt">
      <div class="greet" id="greet">Olá</div>
      <div class="name" id="title">Diário do Bebê</div>
    </div>
    <button class="gear" onclick="openSettings()">⚙️</button>
  </div>
</header>

<div id="installbar" style="display:none">
  <span class="ib-txt">📲 Instalar o Diário na tela inicial</span>
  <button class="ib-btn" onclick="doInstall()">Instalar</button>
  <button class="ib-x" onclick="dismissInstall()" aria-label="fechar">✕</button>
</div>

<div class="wrap">
  <section class="view active" id="view-registrar">
    <div id="ongoing-slot"></div>
    <div class="section-t">Hoje</div>
    <div class="resumo" id="resumo"></div>
    <div class="section-t">Registrar</div>
    <div class="actions">
      <button class="act full sona" id="btn-soneca" onclick="onSoneca()">
        <span class="ico">😴</span>
        <span><span class="nm" id="soneca-nm">Iniciar soneca</span><br><span class="ds" id="soneca-ds">Cochilo de dia. Marca quando pega no sono</span></span>
      </button>
      <button class="act full sono" id="btn-sono" onclick="onSonoNoite()">
        <span class="ico">🛌</span>
        <span><span class="nm" id="sono-nm">Iniciar sono noturno</span><br><span class="ds" id="sono-ds">A dormida da noite. Encerra de manhã</span></span>
      </button>
      <button class="act mamada" id="btn-mamada" onclick="onMamada()">
        <span class="ico">🍼</span><span class="nm" id="mam-nm">Mamada</span><span class="ds" id="mam-ds">Começar a mamar</span>
      </button>
      <button class="act despertar" id="btn-despertar" onclick="onDespertar()">
        <span class="ico">🌙</span><span class="nm" id="desp-nm">Despertar</span><span class="ds" id="desp-ds">Acordou de noite</span>
      </button>
      <button class="act full refeicao" onclick="openRefeicao()">
        <span class="ico">🥣</span>
        <span><span class="nm">Refeição</span><br><span class="ds">Registra a hora e o quanto comeu</span></span>
      </button>
    </div>
  </section>

  <section class="view" id="view-historico"><div id="hist"></div></section>
  <section class="view" id="view-stats"><div id="stats"></div></section>
</div>

<nav class="tabs">
  <button class="active" data-v="registrar" onclick="tab('registrar')"><span class="ic">➕</span>Registrar</button>
  <button data-v="historico" onclick="tab('historico')"><span class="ic">📋</span>Histórico</button>
  <button data-v="stats" onclick="tab('stats')"><span class="ic">📊</span>Estatísticas</button>
</nav>
</div>

<div class="overlay" id="overlay" onclick="if(event.target===this)closeSheet()"><div class="sheet" id="sheet"></div></div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>
/* ===== config ===== */
const SB_URL='https://xvydkvqfcgfysrkmzsae.supabase.co';
const SB_KEY='sb_publishable_Iylj-64xnspCSFg-u34jmw_sdWa2TU-';
const sb=supabase.createClient(SB_URL,SB_KEY);

let EV=[], BABY='', MOTHER='', PHOTO='', BIRTH='', currentEmail='', mode='login', tmpPhoto='', USERID='';
let TIMEFMT=(localStorage.getItem('db_timefmt')==='12h')?'12h':'24h';
let STATS_PERIOD=localStorage.getItem('db_period')||'all';
const DAY_RESET_HOUR=5; // fallback quando não há sono noturno registrado pra ancorar o dia

const TYPES={
  soneca:{nome:'Soneca',emoji:'😴',cor:'var(--sono)',bg:'#1b3559'},
  sono:{nome:'Sono noturno',emoji:'🛌',cor:'var(--sononoite)',bg:'#222a55'},
  mamada:{nome:'Mamada',emoji:'🍼',cor:'var(--mamada)',bg:'#4a331d'},
  refeicao:{nome:'Refeição',emoji:'🥣',cor:'var(--refeicao)',bg:'#243f1d'},
  despertar:{nome:'Despertar',emoji:'🌙',cor:'var(--despertar)',bg:'#3a2647'},
};
const QUAL=[
  {v:0,nome:'Recusou',emoji:'🚫',cor:'var(--bad)',cssCor:'#e5705f'},
  {v:1,nome:'Pouco',emoji:'😕',cor:'var(--ok)',cssCor:'#e0b056'},
  {v:2,nome:'Médio',emoji:'🙂',cor:'var(--mid)',cssCor:'#9fce6a'},
  {v:3,nome:'Bem',emoji:'😋',cor:'var(--good)',cssCor:'#62c46f'},
];
const SERVERS=[
  {v:'mae',nome:'Mãe',emoji:'👩',cssCor:'#e29ad0'},
  {v:'pai',nome:'Pai',emoji:'👨',cssCor:'#7fa8e0'},
  {v:'outro',nome:'Outro',emoji:'🧑',cssCor:'#9aa7b8'},
];
function servedInfo(v){return SERVERS.find(s=>s.v===v)||null;}

/* ===== datas ===== */
function pad2(n){return String(n).padStart(2,'0');}
function fmtHM(h,m){
  if(TIMEFMT==='12h'){const ap=h<12?'AM':'PM';let hh=h%12;if(hh===0)hh=12;return hh+':'+pad2(m)+' '+ap;}
  return pad2(h)+':'+pad2(m);
}
function fmtH(ts){const d=new Date(ts);return fmtHM(d.getHours(),d.getMinutes());}
function hourLabel(h){ // rótulo curto pro eixo dos gráficos
  if(TIMEFMT==='12h'){const ap=h<12?'a':'p';let hh=h%12;if(hh===0)hh=12;return hh+ap;}
  return pad2(h)+'h';
}
function fmtDur(ms){const m=Math.round(ms/60000);if(m<1)return 'menos de 1 min';if(m<60)return m+' min';const h=Math.floor(m/60);const r=m%60;return h+'h'+(r?' '+r+'min':'');}
function dayKey(ts){const d=new Date(ts);return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate());}

/* ---- dia do bebê: do acordar (fim do sono noturno) até o próximo acordar ----
   Cada data de calendário tem um "início de dia": o acordar daquela manhã
   (fim de um sono noturno antes do meio-dia) ou, faltando esse dado, DAY_RESET_HOUR.
   Eventos antes desse início pertencem ao dia anterior — assim a madrugada
   não vira um dia novo. */
function morningWakeOn(dk){
  const cand=EV.filter(e=>e.type==='sono'&&e.end&&dayKey(e.end)===dk&&new Date(e.end).getHours()<12)
               .map(e=>e.end).sort((a,b)=>a-b);
  return cand.length?cand[0]:null;
}
function dayStartMs(dk){
  const w=morningWakeOn(dk); if(w!=null)return w;
  const [y,m,d]=dk.split('-').map(Number);
  return new Date(y,m-1,d,DAY_RESET_HOUR,0,0,0).getTime();
}
function babyDayKey(ts){
  let dk=dayKey(ts);
  if(ts<dayStartMs(dk)) dk=dayKey(ts-864e5);
  return dk;
}
function dayLabel(ts){
  const today=babyDayKey(Date.now());
  const yest=babyDayKey(Date.now()-864e5);
  const k=babyDayKey(ts);
  if(k===today)return 'Hoje';
  if(k===yest)return 'Ontem';
  const [y,m,d]=k.split('-').map(Number); const dt=new Date(y,m-1,d);
  const dias=['domingo','segunda','terça','quarta','quinta','sexta','sábado'];
  const meses=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  return dias[dt.getDay()]+', '+d+' '+meses[m-1];
}
function nightKey(ts){return babyDayKey(ts);}
function fmtClock(min){min=Math.round(((min%1440)+1440)%1440);return fmtHM(Math.floor(min/60),min%60);}
function toLocalInput(ms){const d=new Date(ms);const p=n=>String(n).padStart(2,'0');return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())+'T'+p(d.getHours())+':'+p(d.getMinutes());}
function ageLabel(birth){
  if(!birth)return '';
  const b=new Date(birth+'T00:00:00'), n=new Date();
  let meses=(n.getFullYear()-b.getFullYear())*12+(n.getMonth()-b.getMonth());
  if(n.getDate()<b.getDate())meses--;
  if(meses<0)return '';
  if(meses<1){const dias=Math.floor((n-b)/864e5); const sem=Math.floor(dias/7); return sem<=0?dias+' dias':sem+(sem>1?' semanas':' semana');}
  if(meses<24)return meses+(meses>1?' meses':' mês');
  const anos=Math.floor(meses/12), rm=meses%12;
  return anos+' anos'+(rm?' e '+rm+(rm>1?' meses':' mês'):'');
}
function saudacao(){const h=new Date().getHours(); if(h<12)return 'Bom dia'; if(h<18)return 'Boa tarde'; return 'Boa noite';}

async function doAuth(){
  clearErr();

  const pass=document.getElementById('pass').value;
  if(!email||!pass){showErr('Preencha email e senha.');return;}
  const btn=document.getElementById('auth-btn'); btn.disabled=true; btn.textContent='Aguarde…';
  let res;
  if(mode==='signup') res=await sb.auth.signUp({email,password:pass});
  else res=await sb.auth.signInWithPassword({email,password:pass});
  btn.disabled=false; btn.textContent=mode==='login'?'Entrar':'Criar conta';
  if(res.error){
    const m=res.error.message||'';
    if(/Invalid login/i.test(m))showErr('Email ou senha incorretos.');

    else if(/at least 6/i.test(m))showErr('A senha precisa de no mínimo 6 caracteres.');
    else showErr(m);
  }
}

/* ===== foto ===== */
function compressImage(file,max,q){
  return new Promise(res=>{
    const img=new Image();
    img.onload=()=>{
      let w=img.width,h=img.height;
      if(w>h){if(w>max){h=Math.round(h*max/w);w=max;}}
      else{if(h>max){w=Math.round(w*max/h);h=max;}}
      const c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      res(c.toDataURL('image/jpeg',q));
    };
    img.onerror=()=>res('');
    img.src=URL.createObjectURL(file);
  });
}
async function pickPhoto(ev){
  const f=ev.target.files[0]; if(!f)return;
  const data=await compressImage(f,256,0.72);
  if(!data){toast('Não consegui ler a foto');return;}
  tmpPhoto=data;
  const slot=document.getElementById('phPick'); if(slot)slot.innerHTML=`<img src="${data}">`;
  const av=document.getElementById('set-av'); if(av)av.innerHTML=`<img src="${data}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
}

async function loadEvents(){
  const {data,error}=await sb.from('events').select('*').order('ts',{ascending:false});
  if(error){toast('Erro ao carregar');console.error(error);return;}
  EV=data.map(r=>({id:r.id,type:r.type,ts:new Date(r.ts).getTime(),end:r.end_ts?new Date(r.end_ts).getTime():null,quality:r.quality,note:r.note||'',served:r.served_by||''}));
  render();
}
function activeSoneca(){return EV.find(e=>e.type==='soneca'&&!e.end);}
function activeSono(){return EV.find(e=>e.type==='sono'&&!e.end);}
function activeDespertar(){return EV.find(e=>e.type==='despertar'&&!e.end);}

async function onSoneca(){
  const a=activeSoneca();
  if(a){const {error}=await sb.from('events').update({end_ts:new Date().toISOString()}).eq('id',a.id); if(error){toast('Erro');return;} toast('Soneca: '+fmtDur(Date.now()-a.ts));}
  else{const {error}=await sb.from('events').insert({type:'soneca',ts:new Date().toISOString(),end_ts:null}); if(error){toast('Erro');return;} toast('Soneca iniciada 😴');}
  await loadEvents();
}
async function onSonoNoite(){
  const a=activeSono();
  if(a){
    // se um despertar estiver aberto, é o acordar da manhã: descarta pra não contar como despertar noturno
    const d=activeDespertar();
    if(d&&d.ts>=a.ts){await sb.from('events').delete().eq('id',d.id);}
    const {error}=await sb.from('events').update({end_ts:new Date().toISOString()}).eq('id',a.id);
    if(error){toast('Erro');return;}
    const L=sonoLiquido({ts:a.ts,end:Date.now()});
    toast('Bom dia! Sono líquido: '+fmtDur(L.net));
  } else {
    const {error}=await sb.from('events').insert({type:'sono',ts:new Date().toISOString(),end_ts:null});
    if(error){toast('Erro');return;} toast('Sono noturno iniciado 🛌');
  }
  await loadEvents();
}
async function onDespertar(){
  const d=activeDespertar();
  if(d){const {error}=await sb.from('events').update({end_ts:new Date().toISOString()}).eq('id',d.id); if(error){toast('Erro');return;} toast('Voltou a dormir após '+fmtDur(Date.now()-d.ts));}
  else{const {error}=await sb.from('events').insert({type:'despertar',ts:new Date().toISOString(),end_ts:null}); if(error){toast('Erro');return;} toast('Acordou de noite 🌙');}
  await loadEvents();
}

function openEdit(id){
  const e=EV.find(x=>x.id===id); if(!e)return;
  const t=TYPES[e.type];
  const isSession=['soneca','sono','despertar','mamada'].includes(e.type);
  const isRef=e.type==='refeicao';
  let html=`<h2>${t.emoji} Editar ${t.nome.toLowerCase()}</h2>
    <p class="ph">Ajuste o horário se esqueceu de marcar na hora certa.</p>
    <div class="field"><label>${isSession?'Início':'Horário'}</label><input type="datetime-local" id="ed-ts" value="${toLocalInput(e.ts)}"></div>`;
  if(isSession) html+=`<div class="field"><label>Fim${e.end?'':' (deixe vazio se ainda em andamento)'}</label><input type="datetime-local" id="ed-end" value="${e.end?toLocalInput(e.end):''}"></div>`;
  if(isRef) html+=`<div class="field"><label>O quanto comeu</label><div class="qbtns">${QUAL.map(q=>`<button class="qbtn" onclick="pickQE(${q.v})" id="qe${q.v}"><span class="qe">${q.emoji}</span>${q.nome}</button>`).join('')}</div></div>

      <div class="field"><label>Nota</label><input id="ed-note" value="${(e.note||'').replace(/"/g,'&quot;')}" placeholder="opcional"></div>`;
  html+=`<div class="stack">
      <button class="btn primary" onclick="saveEdit('${id}',${isSession},${isRef})">Salvar</button>
      <button class="btn ghost" onclick="closeSheet()">Cancelar</button>
    </div>`;
  showSheet(html);
  if(isRef){edQ=e.quality; pickQE(e.quality); edS=e.served||null; if(edS)pickSE(edS);}
}
async function saveEdit(id,isSession,isRef){
  const tsV=document.getElementById('ed-ts').value;
  if(!tsV){toast('Coloque o horário');return;}
  const patch={ts:new Date(tsV).toISOString()};
  if(isSession){
    const endV=document.getElementById('ed-end').value;
    if(endV){
      if(new Date(endV).getTime()<new Date(tsV).getTime()){toast('O fim não pode ser antes do início');return;}
      patch.end_ts=new Date(endV).toISOString();
    } else patch.end_ts=null;
  }
  if(isRef){patch.quality=(edQ==null?null:edQ); patch.note=document.getElementById('ed-note').value.trim(); patch.served_by=edS||null;}
  const {error}=await sb.from('events').update(patch).eq('id',id);
  if(error){toast('Erro ao salvar');console.error(error);return;}
  closeSheet(); toast('Atualizado 💙'); await loadEvents();
}

/* despertares fechados dentro de uma noite, e sono líquido */
function despertaresNa(sono){
  const fim=sono.end||Date.now();
  return EV.filter(e=>e.type==='despertar'&&e.end&&e.ts>=sono.ts&&e.ts<=fim);
}
function sonoLiquido(sono){
  const gross=(sono.end||Date.now())-sono.ts;
  const ds=despertaresNa(sono);
  const awake=ds.reduce((s,d)=>s+(d.end-d.ts),0);
  return {gross,awake,net:Math.max(0,gross-awake),n:ds.length};
}

let ongTimer=null;
function tickOngoing(){
  clearInterval(ongTimer);
  const upd=()=>{
    const sono=activeSono(),desp=activeDespertar(),soneca=activeSoneca();
    const a=document.getElementById('ong-sono'); if(sono&&a)a.textContent='há '+fmtDur(Date.now()-sono.ts);
    const b=document.getElementById('ong-desp'); if(desp&&b)b.textContent='há '+fmtDur(Date.now()-desp.ts);

    const mam=activeMamada(); const e=document.getElementById('ong-mam'); if(mam&&e)e.textContent='há '+fmtDur(Date.now()-mam.ts);
    if(!sono&&!desp&&!soneca&&!mam)clearInterval(ongTimer);
  };
  upd(); ongTimer=setInterval(upd,30000);
}
function renderResumo(){
  const today=babyDayKey(Date.now());
  const ev=EV.filter(e=>babyDayKey(e.ts)===today);
  const sonecas=ev.filter(e=>e.type==='soneca'&&e.end);
  const sonoMs=sonecas.reduce((s,e)=>s+(e.end-e.ts),0);
  const desped=EV.filter(e=>e.type==='despertar'&&nightKey(e.ts)===nightKey(Date.now()));
  const cards=[
    {n:sonecas.length,l:'sonecas'},
    {n:sonoMs?fmtDur(sonoMs):'0',l:'soneca (dia)'},
    {n:ev.filter(e=>e.type==='mamada').length,l:'mamadas'},
    {n:desped.length,l:'despertares'},
  ];
  document.getElementById('resumo').innerHTML=cards.map(c=>`<div class="r"><div class="n">${c.n}</div><div class="l">${c.l}</div></div>`).join('');
}
function renderHist(){
  const el=document.getElementById('hist');
  if(!EV.length){el.innerHTML=`<div class="empty"><span class="ico">📋</span>Nada registrado ainda.<br>Toque em <b>Registrar</b> pra começar o diário${BABY?' do '+BABY:''}.</div>`;return;}
  const sorted=[...EV].sort((a,b)=>b.ts-a.ts);
  const groups={}; sorted.forEach(e=>{const k=babyDayKey(e.ts);(groups[k]=groups[k]||[]).push(e);});
  let html='';
  Object.keys(groups).forEach(k=>{
    const list=groups[k];
    html+=`<div class="day-h">${dayLabel(list[0].ts)} <span class="cnt">${list.length} registro${list.length>1?'s':''}</span></div>`;
    list.forEach(e=>{
      const t=TYPES[e.type]; let t1=t.nome,t2='';
      if(e.type==='soneca'){t1='Soneca';t2=e.end?(fmtH(e.ts)+' → '+fmtH(e.end)+' · '+fmtDur(e.end-e.ts)):'em andamento…';}
      else if(e.type==='sono'){
        if(e.end){const L=sonoLiquido(e);t1='Sono noturno';t2=fmtH(e.ts)+' → '+fmtH(e.end)+' · '+fmtDur(L.net)+(L.n?(' líq. · '+L.n+'× acordado ('+fmtDur(L.awake)+')'):'');}
        else{t1='Sono noturno';t2='dormindo…';}
      }
      else if(e.type==='refeicao'){const q=QUAL[e.quality]||QUAL[0];t1=`Refeição <span class="badge" style="background:${q.cor}">${q.emoji} ${q.nome}</span>`;const sv=servedInfo(e.served);t2=[sv?sv.emoji+' '+sv.nome:'',e.note||''].filter(Boolean).join(' · ');}
      else if(e.type==='mamada'){t1='Mamada';t2=e.end?(fmtH(e.ts)+' → '+fmtH(e.end)+' · '+fmtDur(e.end-e.ts)):'mamando…';}
      else if(e.type==='despertar'){t1='Despertar noturno';t2=e.end?(fmtH(e.ts)+' → '+fmtH(e.end)+' · '+fmtDur(e.end-e.ts)+' acordado'):('acordado desde '+fmtH(e.ts)+'…');}
      const isSession=['soneca','sono','despertar','mamada'].includes(e.type);
      const timeR=isSession?'':fmtH(e.ts);
      html+=`<div class="ev"><div class="dot" style="background:${t.bg}">${t.emoji}</div>
        <div class="info"><div class="t1">${t1}</div>${t2?`<div class="t2">${t2}</div>`:''}</div>
        <div class="time">${timeR}</div>
        <button class="edit" onclick="openEdit('${e.id}')" title="Editar horário">✎</button>
        <button class="del" onclick="delEvent('${e.id}')" title="Apagar">✕</button></div>`;
    });
  });
  el.innerHTML=html;
}

/* ===== estatísticas ===== */
const CH={muted:'#8ea6c0',grid:'rgba(255,255,255,.07)',sono:'#6fa8ff',sononoite:'#8a9bff',mamada:'#e6a866',refeicao:'#86cf73',despertar:'#c79be0',accent:'#4f9dff'};
let CHARTS=[], CHARTCFG=[];

function periodDays(){return STATS_PERIOD==='week'?7:STATS_PERIOD==='month'?30:null;}
function keyToDate(k){const [y,m,d]=k.split('-').map(Number);return new Date(y,m-1,d);}
function dateToKey(dt){return dt.getFullYear()+'-'+pad2(dt.getMonth()+1)+'-'+pad2(dt.getDate());}
function shortDay(k){const [,m,d]=k.split('-').map(Number);return pad2(d)+'/'+pad2(m);}
function windowKeys(){
  const endKey=babyDayKey(Date.now()); const days=periodDays(); let startKey;
  if(days){const d=new Date();d.setHours(12,0,0,0);d.setDate(d.getDate()-(days-1));startKey=babyDayKey(d.getTime());}
  else{const all=EV.map(e=>babyDayKey(e.ts)).sort();startKey=all[0]||endKey;}
  const keys=[]; let cur=keyToDate(startKey); const last=keyToDate(endKey); let g=0;
  while(cur<=last&&g<400){keys.push(dateToKey(cur));cur=new Date(cur.getFullYear(),cur.getMonth(),cur.getDate()+1);g++;}
  return {startKey,endKey,keys};
}
function inWindow(e,W){const k=babyDayKey(e.ts);return k>=W.startKey&&k<=W.endKey;}

function renderStats(){
  const el=document.getElementById('stats');
  CHARTCFG=[];
  const sel=`<div class="period-seg">
    <button class="${STATS_PERIOD==='week'?'active':''}" onclick="setPeriod('week')">Semana</button>
    <button class="${STATS_PERIOD==='month'?'active':''}" onclick="setPeriod('month')">Mês</button>
    <button class="${STATS_PERIOD==='all'?'active':''}" onclick="setPeriod('all')">Tudo</button>
  </div>`;
  if(EV.length<2){el.innerHTML=sel+`<div class="empty"><span class="ico">📊</span>As estatísticas aparecem<br>conforme você registra.<br><br>Alguns dias de uso e os padrões${BABY?' do '+BABY:''} aparecem aqui.</div>`;return;}
  const W=windowKeys();
  const pev=EV.filter(e=>inWindow(e,W));
  el.innerHTML=sel+statSonoNoite(pev,W)+statDespertares(pev,W)+statRefeicoes(pev,W)+statSonecas(pev,W)+statMamadas(pev,W);
  maybeBuildCharts();
}
function setPeriod(p){STATS_PERIOD=p;localStorage.setItem('db_period',p);renderStats();}
function card(emoji,titulo,pergunta,inner){return `<div class="stat-card"><h3>${emoji} ${titulo}</h3><p class="q">${pergunta}</p>${inner}</div>`;}
function chartBox(id,cls){return `<div class="chart-box${cls?' '+cls:''}"><canvas id="${id}"></canvas></div>`;}

/* ---- charts ---- */
function maybeBuildCharts(){
  const v=document.getElementById('view-stats');
  if(!(v&&v.classList.contains('active')))return;
  if(!window.Chart){setTimeout(maybeBuildCharts,300);return;}
  buildCharts();
}
function buildCharts(){
  CHARTS.forEach(c=>{try{c.destroy();}catch(e){}}); CHARTS=[];
  if(!window.Chart)return;
  CHARTCFG.forEach(cfg=>{const cv=document.getElementById(cfg.id);if(cv)CHARTS.push(new Chart(cv.getContext('2d'),cfg.config));});
}
function fmtTick(v,unit){if(unit==='hours')return v+'h';if(unit==='minutes')return v+'m';if(unit==='score')return ['🚫','😕','🙂','😋'][v]||'';return v;}
function fmtTip(v,unit){
  if(v==null)return 'sem registro';
  if(unit==='hours')return fmtDur(v*3600000);
  if(unit==='minutes')return fmtDur(v*60000);
  if(unit==='count')return (Number.isInteger(v)?v:v.toFixed(1))+'×';
  if(unit==='score'){const q=QUAL[Math.round(v)]||QUAL[0];return q.emoji+' '+q.nome+' ('+v.toFixed(2)+')';}
  return v;
}
function axisOpts(unit){
  const y={grid:{color:CH.grid},ticks:{color:CH.muted,font:{size:10},callback:v=>fmtTick(v,unit)},beginAtZero:true};
  if(unit==='score'){y.min=0;y.max=3;y.ticks.stepSize=1;}
  return {x:{grid:{display:false},ticks:{color:CH.muted,font:{size:10},maxRotation:0,autoSkip:true,maxTicksLimit:8}},y};
}
function tt(unit){return {backgroundColor:'#06121f',borderColor:CH.grid,borderWidth:1,titleColor:'#fff',bodyColor:'#fff',padding:9,displayColors:false,callbacks:{label:c=>fmtTip(c.parsed.y!=null?c.parsed.y:c.parsed,unit)}};}
function pushLine(id,labels,data,color,unit){
  CHARTCFG.push({id,config:{type:'line',data:{labels,datasets:[{data,borderColor:color,backgroundColor:color+'22',fill:true,tension:.35,spanGaps:true,pointRadius:labels.length>18?0:3,pointBackgroundColor:color,borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:tt(unit)},scales:axisOpts(unit)}}});
}
function pushBar(id,labels,data,colors,unit){
  CHARTCFG.push({id,config:{type:'bar',data:{labels,datasets:[{data,backgroundColor:colors,borderRadius:6,maxBarThickness:32}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:tt(unit)},scales:axisOpts(unit)}}});
}
function pushDoughnut(id,labels,data,colors){
  CHARTCFG.push({id,config:{type:'doughnut',data:{labels,datasets:[{data,backgroundColor:colors,borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,cutout:'60%',plugins:{legend:{position:'right',labels:{color:CH.muted,boxWidth:11,font:{size:12},padding:9}},tooltip:tt('count')}}}});
}

function statSonoNoite(pev,W){
  const noites=pev.filter(e=>e.type==='sono'&&e.end);
  if(!noites.length)return card('🛌','Sono da noite','Quanto ele dorme à noite, de fato?','<div class="hint">Sem sono noturno encerrado neste período. Use o botão "Começar o dia" de manhã.</div>');
  const Ls=noites.map(sonoLiquido);
  const avgNet=Ls.reduce((s,L)=>s+L.net,0)/Ls.length;
  const avgAwake=Ls.reduce((s,L)=>s+L.awake,0)/Ls.length;
  const bedMin=noites.map(e=>{const d=new Date(e.ts);let m=d.getHours()*60+d.getMinutes();if(d.getHours()<12)m+=1440;return m;});
  const wakeMin=noites.map(e=>{const d=new Date(e.end);return d.getHours()*60+d.getMinutes();});
  const avgBed=bedMin.reduce((s,v)=>s+v,0)/bedMin.length;
  const avgWake=wakeMin.reduce((s,v)=>s+v,0)/wakeMin.length;
  const byDay={}; noites.forEach(e=>{const k=babyDayKey(e.ts);(byDay[k]=byDay[k]||[]).push(sonoLiquido(e).net);});
  const data=W.keys.map(k=>byDay[k]?+(byDay[k].reduce((s,v)=>s+v,0)/3600000).toFixed(2):null);
  pushLine('ch-sononoite',W.keys.map(shortDay),data,CH.sononoite,'hours');
  const inner=`<div class="big-num">${fmtDur(avgNet)} <small>por noite (líquido)</small></div>
    <div class="hint">Já descontando os despertares (em média ${fmtDur(avgAwake)} acordado por noite). Base de <b>${noites.length} noite${noites.length>1?'s':''}</b> no período.</div>
    <div class="chart-cap">Sono líquido por noite</div>${chartBox('ch-sononoite')}
    <div class="hint" style="margin-top:10px">Costuma deitar por volta das <b>${fmtClock(avgBed)}</b> e começar o dia às <b>${fmtClock(avgWake)}</b>.</div>`;
  return card('🛌','Sono da noite','Quanto ele dorme à noite, de fato?',inner);
}
function statDespertares(pev,W){
  const desp=pev.filter(e=>e.type==='despertar');
  if(!desp.length)return card('🌙','Despertares noturnos','Quantas vezes acorda, e quanto demora pra voltar?','<div class="hint">Sem despertares no período.</div>');
  const byNight={}; desp.forEach(e=>{const k=nightKey(e.ts);byNight[k]=(byNight[k]||0)+1;});
  const total=desp.length,nNoites=Object.keys(byNight).length; const media=total/nNoites;
  const closed=desp.filter(e=>e.end);
  const avgRet=closed.length?closed.reduce((s,e)=>s+(e.end-e.ts),0)/closed.length:0;
  const nights=new Set(pev.filter(e=>e.type==='sono').map(e=>babyDayKey(e.ts)));
  const trend=W.keys.map(k=>nights.has(k)?(byNight[k]||0):(byNight[k]!=null?byNight[k]:null));
  pushLine('ch-desp-trend',W.keys.map(shortDay),trend,CH.despertar,'count');
  const byHour={}; desp.forEach(e=>{const h=new Date(e.ts).getHours();byHour[h]=(byHour[h]||0)+1;});
  const horas=Object.keys(byHour).map(Number).sort((a,b)=>a-b);
  pushBar('ch-desp-hora',horas.map(hourLabel),horas.map(h=>byHour[h]),CH.despertar,'count');
  const inner=`<div class="big-num">${media.toFixed(1)} <small>despertares / noite</small></div>
    <div class="hint">Base de <b>${nNoites} noite${nNoites>1?'s':''}</b> (${total} no total).${closed.length?` Demora em média <b>${fmtDur(avgRet)}</b> pra voltar a dormir.`:''}</div>
    <div class="chart-cap">Despertares por noite</div>${chartBox('ch-desp-trend','mini')}
    <div class="chart-cap">Horários que mais acorda</div>${chartBox('ch-desp-hora','mini')}`;
  return card('🌙','Despertares noturnos','Quantas vezes acorda, e quanto demora pra voltar?',inner);
}
function statRefeicoes(pev,W){
  const ref=pev.filter(e=>e.type==='refeicao');
  if(!ref.length)return card('🥣','Aceitação das refeições','Em quais horários come melhor?','<div class="hint">Sem refeições no período.</div>');
  const byHour={}; ref.forEach(e=>{const h=new Date(e.ts).getHours();(byHour[h]=byHour[h]||[]).push(e.quality);});
  const horas=Object.keys(byHour).map(Number).sort((a,b)=>a-b);
  let best={h:null,avg:-1};
  const avgs=horas.map(h=>{const arr=byHour[h];const a=arr.reduce((s,v)=>s+v,0)/arr.length;if(a>best.avg)best={h,avg:a};return a;});
  pushBar('ch-ref-hora',horas.map(hourLabel),avgs.map(a=>+a.toFixed(2)),avgs.map(a=>(QUAL[Math.round(a)]||QUAL[0]).cssCor),'score');
  const dist=[0,1,2,3].map(v=>ref.filter(e=>e.quality===v).length);
  pushDoughnut('ch-ref-dist',QUAL.map(q=>q.emoji+' '+q.nome),dist,QUAL.map(q=>q.cssCor));
  const avgAll=ref.reduce((s,e)=>s+e.quality,0)/ref.length; const qAll=QUAL[Math.round(avgAll)];
  const servCount=SERVERS.map(s=>ref.filter(e=>e.served===s.v).length);
  const hasServ=servCount.some(n=>n>0);
  if(hasServ)pushDoughnut('ch-ref-serv',SERVERS.map(s=>s.emoji+' '+s.nome),servCount,SERVERS.map(s=>s.cssCor));
  const inner=`<div class="hint" style="margin:0 0 4px">No geral come <b>${qAll.emoji} ${qAll.nome.toLowerCase()}</b> (${ref.length} refeições no período).</div>
    <div class="chart-cap">Como come no geral</div>${chartBox('ch-ref-dist','mini')}
    <div class="chart-cap">Aceitação média por horário</div>${chartBox('ch-ref-hora','mini')}
    <div class="hint" style="margin-top:8px">Melhor horário: <b>${best.h!=null?hourLabel(best.h):'—'}</b>.</div>
    ${hasServ?`<div class="chart-cap">Quem serviu</div>${chartBox('ch-ref-serv','mini')}`:''}`;
  return card('🥣','Aceitação das refeições','Em quais horários come melhor?',inner);
}
function statSonecas(pev,W){
  const son=pev.filter(e=>e.type==='soneca'&&e.end);
  if(!son.length)return card('😴','Sonecas do dia','Melhores horários e tempo médio de cochilo','<div class="hint">Sem sonecas encerradas no período.</div>');
  const durs=son.map(e=>e.end-e.ts); const mediaMs=durs.reduce((s,v)=>s+v,0)/durs.length;
  const byDay={}; son.forEach(e=>{const k=babyDayKey(e.ts);byDay[k]=(byDay[k]||0)+(e.end-e.ts);});
  pushLine('ch-son-trend',W.keys.map(shortDay),W.keys.map(k=>byDay[k]?+(byDay[k]/60000).toFixed(0):null),CH.sono,'minutes');
  const byHour={}; son.forEach(e=>{const h=new Date(e.ts).getHours();(byHour[h]=byHour[h]||[]).push(e.end-e.ts);});
  const horas=Object.keys(byHour).map(Number).sort((a,b)=>a-b);
  let best={h:null,avg:0};
  const avgs=horas.map(h=>{const arr=byHour[h];const a=arr.reduce((s,v)=>s+v,0)/arr.length;if(a>best.avg)best={h,avg:a};return +(a/60000).toFixed(0);});
  pushBar('ch-son-hora',horas.map(hourLabel),avgs,CH.sono,'minutes');
  const inner=`<div class="big-num">${fmtDur(mediaMs)} <small>por soneca</small></div>
    <div class="hint">Média de <b>${son.length} soneca${son.length>1?'s':''}</b> de dia no período.</div>
    <div class="chart-cap">Total de soneca por dia</div>${chartBox('ch-son-trend','mini')}
    <div class="chart-cap">Duração média por hora de início</div>${chartBox('ch-son-hora','mini')}
    <div class="hint" style="margin-top:8px">Soneca mais longa começa por volta das <b>${best.h!=null?hourLabel(best.h):'—'}</b> (${fmtDur(best.avg)} em média).</div>`;
  return card('😴','Sonecas do dia','Melhores horários e tempo médio de cochilo',inner);
}
function statMamadas(pev,W){
  const mam=pev.filter(e=>e.type==='mamada'); if(!mam.length)return '';
  const byDay={}; mam.forEach(e=>{const k=babyDayKey(e.ts);byDay[k]=(byDay[k]||0)+1;});
  const dias=Object.keys(byDay).length; const mediaDia=mam.length/dias;
  pushLine('ch-mam-trend',W.keys.map(shortDay),W.keys.map(k=>byDay[k]||null),CH.mamada,'count');
  const closed=mam.filter(e=>e.end);
  let inner=`<div class="big-num">${mediaDia.toFixed(1)} <small>mamadas / dia</small></div>
    <div class="hint">Base de <b>${dias} dia${dias>1?'s':''}</b> (${mam.length} no total no período).</div>
    <div class="chart-cap">Mamadas por dia</div>${chartBox('ch-mam-trend','mini')}`;
  if(closed.length){
    const avg=closed.reduce((s,e)=>s+(e.end-e.ts),0)/closed.length;
    const byHour={}; closed.forEach(e=>{const h=new Date(e.ts).getHours();(byHour[h]=byHour[h]||[]).push(e.end-e.ts);});
    const horas=Object.keys(byHour).map(Number).sort((a,b)=>a-b);
    let best={h:null,avg:0};
    const avgs=horas.map(h=>{const arr=byHour[h];const a=arr.reduce((s,v)=>s+v,0)/arr.length;if(a>best.avg)best={h,avg:a};return +(a/60000).toFixed(0);});
    pushBar('ch-mam-hora',horas.map(hourLabel),avgs,CH.mamada,'minutes');
    inner+=`<div class="big-num" style="margin-top:14px">${fmtDur(avg)} <small>por mamada</small></div>
      <div class="hint">Base de ${closed.length} mamada${closed.length>1?'s':''} com início e fim.</div>
      <div class="chart-cap">Duração média por hora</div>${chartBox('ch-mam-hora','mini')}
      <div class="hint" style="margin-top:8px">Mama por mais tempo por volta das <b>${best.h!=null?hourLabel(best.h):'—'}</b>.</div>`;
  } else {
    inner+=`<div class="hint">Use o começar/terminar na mamada pra medir a duração e ver os melhores horários.</div>`;
  }
  return card('🍼','Mamadas','Quantas por dia, e qual a duração média?',inner);
}

/* ===== PWA: service worker + notificação ===== */
async function swPost(msg){
  if(!('serviceWorker' in navigator))return;
  try{const reg=await navigator.serviceWorker.ready;(reg.active||navigator.serviceWorker.controller)&&(reg.active||navigator.serviceWorker.controller).postMessage(msg);}catch(e){}
}
function pushSession(session){
  if(!session)return;
  swPost({type:'session',session:{access_token:session.access_token,refresh_token:session.refresh_token,expires_at:session.expires_at}});
}
function notifAtivo(){return localStorage.getItem('db_notif')==='1' && ('Notification' in window) && Notification.permission==='granted';}
function maybeShowNotif(){ if(notifAtivo()) swPost({type:'show-notif'}); }
async function enableNotif(){
  if(!('Notification' in window)||!('serviceWorker' in navigator)){toast('Este navegador não suporta');return;}
  let p=Notification.permission;
  if(p!=='granted') p=await Notification.requestPermission();
  if(p!=='granted'){toast('Permissão negada — libere nas configurações do navegador');return;}
  localStorage.setItem('db_notif','1');
  await swPost({type:'show-notif'});
  toast('Atalhos na notificação ativados 🔔'); closeSheet();
}
async function disableNotif(){
  localStorage.removeItem('db_notif');
  await swPost({type:'hide-notif'});
  toast('Atalhos desativados'); closeSheet();
}
/* botão de instalar (aparece quando o navegador permite) */
let deferredPrompt=null;
function isStandalone(){return window.matchMedia&&window.matchMedia('(display-mode: standalone)').matches || navigator.standalone===true;}
function showInstallBar(){
  const b=document.getElementById('installbar');
  if(!b)return;
  if(deferredPrompt && !isStandalone() && localStorage.getItem('db_install_dismiss')!=='1') b.style.display='flex';
  else b.style.display='none';
}
window.addEventListener('beforeinstallprompt',e=>{ e.preventDefault(); deferredPrompt=e; showInstallBar(); });
window.addEventListener('appinstalled',()=>{ deferredPrompt=null; const b=document.getElementById('installbar'); if(b)b.style.display='none'; toast('App instalado 💙'); });
async function doInstall(){
  if(!deferredPrompt){toast('Use o menu do navegador → Instalar app');return;}
  deferredPrompt.prompt();
  try{await deferredPrompt.userChoice;}catch(e){}
  deferredPrompt=null;
  const b=document.getElementById('installbar'); if(b)b.style.display='none';
}
function dismissInstall(){ localStorage.setItem('db_install_dismiss','1'); const b=document.getElementById('installbar'); if(b)b.style.display='none'; }

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
  navigator.serviceWorker.addEventListener('message',ev=>{
    const d=ev.data||{};
    if(d.type==='reload'){ if(typeof loadEvents==='function')loadEvents(); }
    else if(d.type==='open-refeicao'){ openRefeicao(); }
  });
}

/* ===== boot ===== */
async function loadProfile(){
  const {data,error}=await sb.from('profiles').select('*').eq('user_id',USERID).maybeSingle();
  if(error)console.error(error);
  const m=data||{};
  BABY=m.baby_name||''; MOTHER=m.mother_name||''; BIRTH=m.baby_birth||''; PHOTO=m.baby_photo||'';
}
function revealApp(){
  document.getElementById('boot').style.display='none';
  document.getElementById('auth').classList.remove('show');
  document.getElementById('onboard').classList.remove('show');
  document.getElementById('app').classList.add('show');
  loadEvents().then(()=>{ maybeShowNotif(); checkOpenParam(); showInstallBar(); });
}
function checkOpenParam(){
  try{
    const p=new URLSearchParams(location.search);
    if(p.get('open')==='refeicao'){ openRefeicao(); history.replaceState(null,'',location.pathname); }
  }catch(e){}
}
function showAuth(){document.getElementById('boot').style.display='none';document.getElementById('app').classList.remove('show');document.getElementById('onboard').classList.remove('show');document.getElementById('auth').classList.add('show');}
async function enter(session){currentEmail=session.user.email; USERID=session.user.id; await loadProfile(); if(!BABY)showOnboard(); else revealApp();}
sb.auth.onAuthStateChange((event,session)=>{
  if(session){ pushSession(session); if(event==='TOKEN_REFRESHED')return; enter(session); }
  else { swPost({type:'logout'}); showAuth(); }
});
(async()=>{const {data}=await sb.auth.getSession(); if(data.session){pushSession(data.session); enter(data.session);} else showAuth();})();
</script>
