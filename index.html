<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Diário do Bebê">
<meta name="theme-color" content="#6b8f71">
<title>Diário do Bebê</title>
<style>
  :root{
    --bg:#f6f3ee; --card:#ffffff; --ink:#2f2a26; --muted:#8a817a;
    --line:#e7e0d7; --accent:#6b8f71; --accent-d:#557a5c;
    --sono:#5b7db1; --mamada:#c98a4b; --refeicao:#7a9a5c; --despertar:#a86b8f;
    --bad:#c2503f; --ok:#d8a24a; --mid:#8aa85f; --good:#4f8a52;
    --shadow:0 1px 3px rgba(60,50,40,.08),0 2px 8px rgba(60,50,40,.06);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) 0 env(safe-area-inset-left);
    max-width:560px; margin:0 auto; min-height:100vh;
  }
  header{
    padding:16px 16px 10px; position:sticky; top:0; z-index:5;
    background:linear-gradient(180deg,var(--bg) 70%,rgba(246,243,238,0));
  }
  header h1{font-size:19px; margin:0; display:flex; align-items:center; gap:8px}
  header .sub{font-size:12.5px; color:var(--muted); margin-top:2px}
  .gear{margin-left:auto; background:none; border:none; font-size:20px; cursor:pointer; padding:4px; color:var(--muted)}
  .wrap{padding:0 16px 120px}

  .tabs{
    position:fixed; bottom:0; left:0; right:0; max-width:560px; margin:0 auto;
    display:flex; background:var(--card); border-top:1px solid var(--line);
    padding:6px 6px calc(6px + env(safe-area-inset-bottom)); z-index:10;
  }
  .tabs button{
    flex:1; background:none; border:none; padding:8px 2px; font-size:11px; color:var(--muted);
    display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer; font-weight:600;
  }
  .tabs button .ic{font-size:21px; line-height:1}
  .tabs button.active{color:var(--accent-d)}

  .view{display:none} .view.active{display:block}

  .resumo{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin:4px 0 18px}
  .resumo .r{background:var(--card); border-radius:14px; padding:10px 6px; text-align:center; box-shadow:var(--shadow)}
  .resumo .r .n{font-size:22px; font-weight:700; line-height:1}
  .resumo .r .l{font-size:10.5px; color:var(--muted); margin-top:4px}

  .section-t{font-size:12px; color:var(--muted); font-weight:700; text-transform:uppercase; letter-spacing:.04em; margin:18px 2px 10px}

  .ongoing{background:linear-gradient(135deg,#5b7db1,#43618f); color:#fff; border-radius:16px; padding:14px 16px; margin-bottom:16px; display:flex; align-items:center; gap:12px; box-shadow:var(--shadow)}
  .ongoing .txt{flex:1}
  .ongoing .txt .a{font-size:13px; opacity:.9}
  .ongoing .txt .b{font-size:20px; font-weight:700; margin-top:2px}
  .ongoing button{background:#fff; color:#43618f; border:none; border-radius:12px; padding:11px 16px; font-size:15px; font-weight:700; cursor:pointer}

  .actions{display:grid; grid-template-columns:1fr 1fr; gap:12px}
  .act{background:var(--card); border:1.5px solid var(--line); border-radius:18px; padding:18px 14px; display:flex; flex-direction:column; align-items:flex-start; gap:6px; cursor:pointer; box-shadow:var(--shadow); transition:transform .06s ease; text-align:left; width:100%; color:var(--ink)}
  .act:active{transform:scale(.97)}
  .act .ico{font-size:30px; line-height:1}
  .act .nm{font-size:16px; font-weight:700}
  .act .ds{font-size:12px; color:var(--muted)}
  .act.full{grid-column:1 / -1; flex-direction:row; align-items:center; gap:14px}
  .act.full .ico{font-size:28px}
  .act.sono{border-color:#cdd9ea} .act.mamada{border-color:#ecd8c2}
  .act.refeicao{border-color:#d7e2c8} .act.despertar{border-color:#e6cfdd}

  .day-h{font-size:13px; font-weight:700; color:var(--accent-d); margin:18px 2px 8px; display:flex; align-items:center; gap:8px}
  .day-h .cnt{font-size:11px; color:var(--muted); font-weight:600}
  .ev{background:var(--card); border-radius:14px; padding:11px 13px; margin-bottom:8px; display:flex; align-items:center; gap:11px; box-shadow:var(--shadow)}
  .ev .dot{width:34px; height:34px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0}
  .ev .info{flex:1; min-width:0}
  .ev .info .t1{font-size:14.5px; font-weight:600}
  .ev .info .t2{font-size:12px; color:var(--muted); margin-top:1px}
  .ev .time{font-size:13px; color:var(--muted); font-variant-numeric:tabular-nums; white-space:nowrap}
  .ev .del{background:none; border:none; color:#c9bdb0; font-size:18px; padding:4px 2px 4px 8px; cursor:pointer}
  .badge{display:inline-block; font-size:11px; font-weight:700; padding:2px 8px; border-radius:20px; color:#fff}

  .stat-card{background:var(--card); border-radius:16px; padding:16px; margin-bottom:14px; box-shadow:var(--shadow)}
  .stat-card h3{margin:0 0 3px; font-size:15px}
  .stat-card .q{font-size:12.5px; color:var(--muted); margin:0 0 14px}
  .big-num{font-size:30px; font-weight:800; color:var(--accent-d); line-height:1}
  .big-num small{font-size:14px; color:var(--muted); font-weight:600}
  .bar-row{display:flex; align-items:center; gap:8px; margin:7px 0; font-size:12.5px}
  .bar-row .lbl{width:42px; color:var(--muted); font-variant-numeric:tabular-nums; flex-shrink:0}
  .bar-row .track{flex:1; background:#efe9e1; border-radius:8px; height:18px; overflow:hidden; position:relative}
  .bar-row .fill{height:100%; border-radius:8px; min-width:2px}
  .bar-row .val{width:54px; text-align:right; color:var(--ink); font-weight:600; flex-shrink:0; font-variant-numeric:tabular-nums}
  .hint{font-size:12px; color:var(--muted); margin-top:10px; line-height:1.5}
  .hint b{color:var(--accent-d)}
  .empty{text-align:center; color:var(--muted); padding:40px 20px; font-size:14px}
  .empty .ico{font-size:40px; display:block; margin-bottom:10px; opacity:.6}

  .overlay{position:fixed; inset:0; background:rgba(40,33,28,.45); display:none; align-items:flex-end; z-index:50}
  .overlay.show{display:flex}
  .sheet{background:var(--bg); width:100%; max-width:560px; margin:0 auto; border-radius:22px 22px 0 0; padding:18px 18px calc(20px + env(safe-area-inset-bottom)); animation:up .22s ease}
  @keyframes up{from{transform:translateY(40px); opacity:.4}to{transform:translateY(0); opacity:1}}
  .sheet h2{margin:2px 0 4px; font-size:18px}
  .sheet .ph{font-size:13px; color:var(--muted); margin:0 0 16px}
  .qbtns{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px}
  .qbtn{border:1.5px solid var(--line); background:var(--card); border-radius:14px; padding:14px 8px; font-size:15px; font-weight:700; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:5px; color:var(--ink)}
  .qbtn .qe{font-size:24px}
  .qbtn:active{transform:scale(.97)}
  .field{margin-bottom:14px}
  .field label{font-size:12px; color:var(--muted); font-weight:600; display:block; margin-bottom:5px}
  .field input{width:100%; border:1.5px solid var(--line); border-radius:12px; padding:12px; font-size:16px; background:var(--card); color:var(--ink); font-family:inherit}
  .btn{border:none; border-radius:13px; padding:14px; font-size:15px; font-weight:700; cursor:pointer; width:100%}
  .btn.primary{background:var(--accent); color:#fff}
  .btn.ghost{background:var(--card); color:var(--ink); border:1.5px solid var(--line)}
  .btn.danger{background:#fbeeec; color:var(--bad)}
  .btn:disabled{opacity:.5}
  .sheet .stack{display:flex; flex-direction:column; gap:9px}

  .toast{position:fixed; bottom:90px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--ink); color:#fff; padding:11px 18px; border-radius:30px; font-size:13.5px; font-weight:600; opacity:0; transition:.25s; z-index:60; pointer-events:none; white-space:nowrap; box-shadow:0 4px 16px rgba(0,0,0,.2)}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0)}

  /* auth */
  #auth{display:none; min-height:100vh; flex-direction:column; justify-content:center; padding:24px; max-width:420px; margin:0 auto}
  #auth.show{display:flex}
  #auth .logo{font-size:48px; text-align:center; margin-bottom:6px}
  #auth h1{font-size:24px; text-align:center; margin:0 0 4px}
  #auth p.s{text-align:center; color:var(--muted); font-size:13.5px; margin:0 0 26px}
  #auth .err{background:#fbeeec; color:var(--bad); font-size:13px; padding:11px 13px; border-radius:12px; margin-bottom:12px; display:none}
  #auth .err.show{display:block}
  #auth .toggle{text-align:center; margin-top:16px; font-size:13.5px; color:var(--muted)}
  #auth .toggle a{color:var(--accent-d); font-weight:700; text-decoration:none; cursor:pointer}
  #app{display:none}
  #app.show{display:block}
  #boot{min-height:100vh; display:flex; align-items:center; justify-content:center; color:var(--muted); font-size:14px}
</style>
</head>
<body>

<!-- boot -->
<div id="boot">Carregando…</div>

<!-- LOGIN / CADASTRO -->
<div id="auth">
  <div class="logo">🍼</div>
  <h1>Diário do Bebê</h1>
  <p class="s" id="auth-sub">Entre pra acessar seus registros</p>
  <div class="err" id="auth-err"></div>
  <div class="field"><label>Email</label><input id="email" type="email" autocomplete="email" placeholder="seu@email.com"></div>
  <div class="field"><label>Senha</label><input id="pass" type="password" autocomplete="current-password" placeholder="mínimo 6 caracteres"></div>
  <button class="btn primary" id="auth-btn" onclick="doAuth()">Entrar</button>
  <div class="toggle" id="auth-toggle">Ainda não tem conta? <a onclick="toggleMode()">Criar conta</a></div>
</div>

<!-- APP -->
<div id="app">
<header>
  <h1>🍼 <span id="title">Diário do Bebê</span>
    <button class="gear" onclick="openSettings()">⚙️</button>
  </h1>
  <div class="sub" id="subtitle">Registre com um toque. Tudo salvo na sua conta.</div>
</header>

<div class="wrap">
  <section class="view active" id="view-registrar">
    <div id="ongoing-slot"></div>
    <div class="section-t">Hoje</div>
    <div class="resumo" id="resumo"></div>
    <div class="section-t">Registrar</div>
    <div class="actions">
      <button class="act full sono" id="btn-sono" onclick="onSono()">
        <span class="ico">😴</span>
        <span><span class="nm" id="sono-nm">Iniciar soneca</span><br><span class="ds" id="sono-ds">Marca a hora que começou a dormir</span></span>
      </button>
      <button class="act mamada" onclick="quickAdd('mamada')">
        <span class="ico">🍼</span><span class="nm">Mamada</span><span class="ds">Registra agora</span>
      </button>
      <button class="act despertar" onclick="quickAdd('despertar')">
        <span class="ico">🌙</span><span class="nm">Despertar</span><span class="ds">Acordou de noite</span>
      </button>
      <button class="act full refeicao" onclick="openRefeicao()">
        <span class="ico">🥣</span>
        <span><span class="nm">Refeição</span><br><span class="ds">Registra a hora e o quanto comeu</span></span>
      </button>
    </div>
  </section>

  <section class="view" id="view-historico"><div id="hist"></div></section>
  <section class="view" id="view-stats"><div id="stats"></div></section>
</div>

<nav class="tabs">
  <button class="active" data-v="registrar" onclick="tab('registrar')"><span class="ic">➕</span>Registrar</button>
  <button data-v="historico" onclick="tab('historico')"><span class="ic">📋</span>Histórico</button>
  <button data-v="stats" onclick="tab('stats')"><span class="ic">📊</span>Estatísticas</button>
</nav>
</div>

<div class="overlay" id="overlay" onclick="if(event.target===this)closeSheet()"><div class="sheet" id="sheet"></div></div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ===== config Supabase ===== */
const SB_URL='https://xvydkvqfcgfysrkmzsae.supabase.co';
const SB_KEY='sb_publishable_Iylj-64xnspCSFg-u34jmw_sdWa2TU-';
const sb=supabase.createClient(SB_URL,SB_KEY);

let EV=[];          // eventos em memória, normalizados {id,type,ts(ms),end(ms|null),quality,note}
let BABY='';
let mode='login';   // login | signup

/* ===== meta ===== */
const TYPES={
  soneca:{nome:'Soneca',emoji:'😴',cor:'var(--sono)',bg:'#e5edf6'},
  mamada:{nome:'Mamada',emoji:'🍼',cor:'var(--mamada)',bg:'#f7ead9'},
  refeicao:{nome:'Refeição',emoji:'🥣',cor:'var(--refeicao)',bg:'#e9f0dd'},
  despertar:{nome:'Despertar',emoji:'🌙',cor:'var(--despertar)',bg:'#f3e3ee'},
};
const QUAL=[
  {v:0,nome:'Recusou',emoji:'🚫',cor:'var(--bad)'},
  {v:1,nome:'Pouco',emoji:'😕',cor:'var(--ok)'},
  {v:2,nome:'Médio',emoji:'🙂',cor:'var(--mid)'},
  {v:3,nome:'Bem',emoji:'😋',cor:'var(--good)'},
];

/* ===== datas ===== */
function fmtH(ts){const d=new Date(ts);return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
function fmtDur(ms){const m=Math.round(ms/60000);if(m<60)return m+' min';const h=Math.floor(m/60);const r=m%60;return h+'h'+(r?' '+r+'min':'');}
function dayKey(ts){const d=new Date(ts);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function dayLabel(ts){
  const d=new Date(ts),t=new Date(),y=new Date(t.getTime()-864e5);
  if(dayKey(ts)===dayKey(t))return 'Hoje';
  if(dayKey(ts)===dayKey(y))return 'Ontem';
  const dias=['domingo','segunda','terça','quarta','quinta','sexta','sábado'];
  const meses=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  return dias[d.getDay()]+', '+d.getDate()+' '+meses[d.getMonth()];
}
function nightKey(ts){return dayKey(ts-12*36e5);}

/* ===== auth ===== */
function showErr(m){const e=document.getElementById('auth-err');e.textContent=m;e.classList.add('show');}
function clearErr(){document.getElementById('auth-err').classList.remove('show');}
function toggleMode(){
  mode=mode==='login'?'signup':'login';
  document.getElementById('auth-sub').textContent=mode==='login'?'Entre pra acessar seus registros':'Crie sua conta pra começar';
  document.getElementById('auth-btn').textContent=mode==='login'?'Entrar':'Criar conta';
  document.getElementById('auth-toggle').innerHTML=mode==='login'
    ?'Ainda não tem conta? <a onclick="toggleMode()">Criar conta</a>'
    :'Já tem conta? <a onclick="toggleMode()">Entrar</a>';
  clearErr();
}
async function doAuth(){
  clearErr();
  const email=document.getElementById('email').value.trim();
  const pass=document.getElementById('pass').value;
  if(!email||!pass){showErr('Preencha email e senha.');return;}
  const btn=document.getElementById('auth-btn'); btn.disabled=true; btn.textContent='Aguarde…';
  let res;
  if(mode==='signup') res=await sb.auth.signUp({email,password:pass});
  else res=await sb.auth.signInWithPassword({email,password:pass});
  btn.disabled=false; btn.textContent=mode==='login'?'Entrar':'Criar conta';
  if(res.error){
    const msg=res.error.message||'';
    if(/Invalid login/i.test(msg))showErr('Email ou senha incorretos.');
    else if(/already registered/i.test(msg))showErr('Esse email já tem conta. Tente entrar.');
    else if(/at least 6/i.test(msg))showErr('A senha precisa de no mínimo 6 caracteres.');
    else showErr(msg);
    return;
  }
  // onAuthStateChange cuida de mostrar o app
}
async function logout(){await sb.auth.signOut(); closeSheet();}

/* ===== dados (Supabase) ===== */
async function loadEvents(){
  const {data,error}=await sb.from('events').select('*').order('ts',{ascending:false});
  if(error){toast('Erro ao carregar'); console.error(error); return;}
  EV=data.map(r=>({
    id:r.id, type:r.type,
    ts:new Date(r.ts).getTime(),
    end:r.end_ts?new Date(r.end_ts).getTime():null,
    quality:r.quality, note:r.note||''
  }));
  render();
}
function activeSono(){return EV.find(e=>e.type==='soneca'&&!e.end);}

async function onSono(){
  const a=activeSono();
  if(a){
    const {error}=await sb.from('events').update({end_ts:new Date().toISOString()}).eq('id',a.id);
    if(error){toast('Erro');return;}
    toast('Soneca: '+fmtDur(Date.now()-a.ts));
  } else {
    const {error}=await sb.from('events').insert({type:'soneca',ts:new Date().toISOString(),end_ts:null});
    if(error){toast('Erro');return;}
    toast('Soneca iniciada 😴');
  }
  await loadEvents();
}
async function quickAdd(type){
  const {error}=await sb.from('events').insert({type,ts:new Date().toISOString()});
  if(error){toast('Erro');return;}
  toast(TYPES[type].nome+' registrada '+TYPES[type].emoji);
  await loadEvents();
}
function openRefeicao(){
  let chosen=null;
  const html=`
    <h2>🥣 Refeição</h2>
    <p class="ph">O quanto ele comeu agora?</p>
    <div class="qbtns" id="qb">
      ${QUAL.map(q=>`<button class="qbtn" onclick="pickQ(${q.v})" id="q${q.v}"><span class="qe">${q.emoji}</span>${q.nome}</button>`).join('')}
    </div>
    <div class="field"><label>Nota (opcional)</label><input id="rnote" placeholder="ex: fruta, recusou a sopa, comeu sozinho"></div>
    <div class="stack">
      <button class="btn primary" onclick="saveRefeicao()">Salvar refeição</button>
      <button class="btn ghost" onclick="closeSheet()">Cancelar</button>
    </div>`;
  showSheet(html);
  window.pickQ=v=>{chosen=v;QUAL.forEach(q=>{const el=document.getElementById('q'+q.v);el.style.borderColor=q.v===v?q.cor:'var(--line)';el.style.background=q.v===v?q.cor:'var(--card)';el.style.color=q.v===v?'#fff':'var(--ink)';});};
  window.saveRefeicao=async()=>{
    if(chosen===null){toast('Escolha o quanto comeu');return;}
    const note=document.getElementById('rnote').value.trim();
    const {error}=await sb.from('events').insert({type:'refeicao',ts:new Date().toISOString(),quality:chosen,note});
    if(error){toast('Erro');return;}
    closeSheet(); toast('Refeição registrada 🥣'); await loadEvents();
  };
}
async function delEvent(id){
  const {error}=await sb.from('events').delete().eq('id',id);
  if(error){toast('Erro');return;}
  toast('Apagado'); await loadEvents();
}

/* ===== abas ===== */
function tab(v){
  document.querySelectorAll('.view').forEach(s=>s.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.querySelectorAll('.tabs button').forEach(b=>b.classList.toggle('active',b.dataset.v===v));
  window.scrollTo(0,0);
}

/* ===== render ===== */
function render(){
  document.getElementById('title').textContent=BABY?('Diário · '+BABY):'Diário do Bebê';
  renderOngoing(); renderResumo(); renderHist(); renderStats();
}
function renderOngoing(){
  const slot=document.getElementById('ongoing-slot');
  const a=activeSono();
  const nm=document.getElementById('sono-nm'),ds=document.getElementById('sono-ds');
  if(a){
    nm.textContent='Acordou'; ds.textContent='Encerra a soneca em andamento';
    slot.innerHTML=`<div class="ongoing"><span style="font-size:26px">😴</span>
      <div class="txt"><div class="a">Dormindo desde ${fmtH(a.ts)}</div><div class="b" id="ong-dur">—</div></div>
      <button onclick="onSono()">Acordou</button></div>`;
    tickOngoing();
  } else { nm.textContent='Iniciar soneca'; ds.textContent='Marca a hora que começou a dormir'; slot.innerHTML=''; }
}
let ongTimer=null;
function tickOngoing(){
  clearInterval(ongTimer);
  const upd=()=>{const a=activeSono();const el=document.getElementById('ong-dur');if(a&&el)el.textContent='há '+fmtDur(Date.now()-a.ts);else clearInterval(ongTimer);};
  upd(); ongTimer=setInterval(upd,30000);
}
function renderResumo(){
  const today=dayKey(Date.now());
  const ev=EV.filter(e=>dayKey(e.ts)===today);
  const sonecas=ev.filter(e=>e.type==='soneca'&&e.end);
  const sonoMs=sonecas.reduce((s,e)=>s+(e.end-e.ts),0);
  const cards=[
    {n:sonecas.length,l:'sonecas'},
    {n:sonoMs?fmtDur(sonoMs):'0',l:'de sono'},
    {n:ev.filter(e=>e.type==='mamada').length,l:'mamadas'},
    {n:ev.filter(e=>e.type==='despertar').length,l:'despertares'},
  ];
  document.getElementById('resumo').innerHTML=cards.map(c=>`<div class="r"><div class="n">${c.n}</div><div class="l">${c.l}</div></div>`).join('');
}
function renderHist(){
  const el=document.getElementById('hist');
  if(!EV.length){el.innerHTML=`<div class="empty"><span class="ico">📋</span>Nenhum registro ainda.<br>Toque em <b>Registrar</b> pra começar.</div>`;return;}
  const sorted=[...EV].sort((a,b)=>b.ts-a.ts);
  const groups={};
  sorted.forEach(e=>{const k=dayKey(e.ts);(groups[k]=groups[k]||[]).push(e);});
  let html='';
  Object.keys(groups).forEach(k=>{
    const list=groups[k];
    html+=`<div class="day-h">${dayLabel(list[0].ts)} <span class="cnt">${list.length} registro${list.length>1?'s':''}</span></div>`;
    list.forEach(e=>{
      const t=TYPES[e.type]; let t1=t.nome,t2='';
      if(e.type==='soneca'){ t1='Soneca'; t2=e.end?(fmtH(e.ts)+' → '+fmtH(e.end)+' · '+fmtDur(e.end-e.ts)):'em andamento…'; }
      else if(e.type==='refeicao'){ const q=QUAL[e.quality]||QUAL[0]; t1=`Refeição <span class="badge" style="background:${q.cor}">${q.emoji} ${q.nome}</span>`; t2=e.note||''; }
      else if(e.type==='mamada'){ t2='Mamada'; }
      else if(e.type==='despertar'){ t2='Despertar noturno'; }
      const timeR=e.type==='soneca'&&e.end?'':fmtH(e.ts);
      html+=`<div class="ev"><div class="dot" style="background:${t.bg}">${t.emoji}</div>
        <div class="info"><div class="t1">${t1}</div>${t2?`<div class="t2">${t2}</div>`:''}</div>
        <div class="time">${timeR}</div><button class="del" onclick="delEvent('${e.id}')">✕</button></div>`;
    });
  });
  el.innerHTML=html;
}

/* ===== estatísticas ===== */
function renderStats(){
  const el=document.getElementById('stats');
  if(EV.length<2){el.innerHTML=`<div class="empty"><span class="ico">📊</span>As estatísticas aparecem<br>conforme você registra.<br><br>Registre por alguns dias pra ver os padrões.</div>`;return;}
  el.innerHTML=statDespertares()+statRefeicoes()+statSonecas()+statMamadas();
}
function bar(label,pct,val,cor){return `<div class="bar-row"><div class="lbl">${label}</div><div class="track"><div class="fill" style="width:${pct}%;background:${cor}"></div></div><div class="val">${val}</div></div>`;}
function card(emoji,titulo,pergunta,inner){return `<div class="stat-card"><h3>${emoji} ${titulo}</h3><p class="q">${pergunta}</p>${inner}</div>`;}
function statDespertares(){
  const desp=EV.filter(e=>e.type==='despertar');
  if(!desp.length)return card('🌙','Despertares noturnos','Quantas vezes ele acorda por noite?','<div class="hint">Sem despertares registrados ainda.</div>');
  const byNight={}; desp.forEach(e=>{const k=nightKey(e.ts);byNight[k]=(byNight[k]||0)+1;});
  const noites=Object.keys(byNight).sort(); const total=desp.length,nNoites=noites.length; const media=total/nNoites;
  const byHour={}; desp.forEach(e=>{const h=new Date(e.ts).getHours();byHour[h]=(byHour[h]||0)+1;});
  const maxH=Math.max(...Object.values(byHour));
  const horas=Object.keys(byHour).map(Number).sort((a,b)=>a-b);
  const bars=horas.map(h=>bar(String(h).padStart(2,'0')+'h',Math.round(byHour[h]/maxH*100),byHour[h]+'×','var(--despertar)')).join('');
  const last=noites.slice(-5).map(k=>byNight[k]);
  const inner=`<div class="big-num">${media.toFixed(1)} <small>despertares / noite</small></div>
    <div class="hint">Média de <b>${nNoites} noite${nNoites>1?'s':''}</b> (${total} no total). Últimas: ${last.join(', ')}.</div>
    <div class="section-t" style="margin:16px 2px 8px">Horários que mais acorda</div>${bars}`;
  return card('🌙','Despertares noturnos','Quantas vezes ele acorda por noite?',inner);
}
function statRefeicoes(){
  const ref=EV.filter(e=>e.type==='refeicao');
  if(!ref.length)return card('🥣','Aceitação das refeições','Em quais horários ele come melhor?','<div class="hint">Sem refeições registradas ainda.</div>');
  const byHour={}; ref.forEach(e=>{const h=new Date(e.ts).getHours();(byHour[h]=byHour[h]||[]).push(e.quality);});
  const horas=Object.keys(byHour).map(Number).sort((a,b)=>a-b);
  let best={h:null,avg:-1};
  const bars=horas.map(h=>{
    const arr=byHour[h]; const avg=arr.reduce((s,v)=>s+v,0)/arr.length;
    if(avg>best.avg){best={h,avg,n:arr.length};}
    const q=QUAL[Math.round(avg)]||QUAL[0];
    return bar(String(h).padStart(2,'0')+'h',Math.round(avg/3*100),q.emoji+' '+arr.length+'×',q.cor);
  }).join('');
  const avgAll=ref.reduce((s,e)=>s+e.quality,0)/ref.length; const qAll=QUAL[Math.round(avgAll)];
  const inner=`<div class="hint" style="margin:0 0 12px">No geral come <b>${qAll.emoji} ${qAll.nome.toLowerCase()}</b> (${ref.length} refeições). Barra cheia = comeu bem.</div>
    ${bars}
    <div class="hint">Melhor horário até agora: <b>${best.h!=null?String(best.h).padStart(2,'0')+'h':'—'}</b>.</div>`;
  return card('🥣','Aceitação das refeições','Em quais horários ele come melhor?',inner);
}
function statSonecas(){
  const son=EV.filter(e=>e.type==='soneca'&&e.end);
  if(!son.length)return card('😴','Sonecas','Melhores horários e tempo médio de sono','<div class="hint">Encerre algumas sonecas (botão "Acordou") pra ver os padrões.</div>');
  const durs=son.map(e=>e.end-e.ts); const mediaMs=durs.reduce((s,v)=>s+v,0)/durs.length;
  const byHour={}; son.forEach(e=>{const h=new Date(e.ts).getHours();(byHour[h]=byHour[h]||[]).push(e.end-e.ts);});
  const horas=Object.keys(byHour).map(Number).sort((a,b)=>a-b);
  const maxAvg=Math.max(...horas.map(h=>byHour[h].reduce((s,v)=>s+v,0)/byHour[h].length));
  let best={h:null,avg:0};
  const bars=horas.map(h=>{
    const arr=byHour[h]; const avg=arr.reduce((s,v)=>s+v,0)/arr.length;
    if(avg>best.avg){best={h,avg,n:arr.length};}
    return bar(String(h).padStart(2,'0')+'h',Math.round(avg/maxAvg*100),fmtDur(avg),'var(--sono)');
  }).join('');
  const inner=`<div class="big-num">${fmtDur(mediaMs)} <small>por soneca</small></div>
    <div class="hint">Média de <b>${son.length} soneca${son.length>1?'s':''}</b> encerrada${son.length>1?'s':''}. Barras = duração média por hora de início.</div>
    <div class="section-t" style="margin:16px 2px 8px">Duração por hora de início</div>${bars}
    <div class="hint">Soneca mais longa começa por volta das <b>${best.h!=null?String(best.h).padStart(2,'0')+'h':'—'}</b> (${fmtDur(best.avg)} em média).</div>`;
  return card('😴','Sonecas','Melhores horários e tempo médio de sono',inner);
}
function statMamadas(){
  const mam=EV.filter(e=>e.type==='mamada'); if(!mam.length)return '';
  const byDay={}; mam.forEach(e=>{const k=dayKey(e.ts);byDay[k]=(byDay[k]||0)+1;});
  const dias=Object.keys(byDay); const media=mam.length/dias.length;
  const inner=`<div class="big-num">${media.toFixed(1)} <small>mamadas / dia</small></div>
    <div class="hint">Média de <b>${dias.length} dia${dias.length>1?'s':''}</b> (${mam.length} no total).</div>`;
  return card('🍼','Mamadas','Quantas por dia, em média?',inner);
}

/* ===== sheet / settings ===== */
function showSheet(html){document.getElementById('sheet').innerHTML=html;document.getElementById('overlay').classList.add('show');}
function closeSheet(){document.getElementById('overlay').classList.remove('show');}
function openSettings(){
  const html=`
    <h2>⚙️ Configurações</h2>
    <p class="ph">Conta: ${currentEmail||'—'}</p>
    <div class="field"><label>Nome do bebê (opcional)</label><input id="bname" value="${BABY||''}" placeholder="ex: Tom"></div>
    <div class="stack">
      <button class="btn primary" onclick="saveName()">Salvar nome</button>
      <button class="btn ghost" onclick="logout()">Sair da conta</button>
      <button class="btn ghost" onclick="closeSheet()">Fechar</button>
    </div>
    <div class="hint" style="margin-top:14px">${EV.length} registros na sua conta, salvos na nuvem.</div>`;
  showSheet(html);
}
async function saveName(){
  BABY=document.getElementById('bname').value.trim();
  await sb.auth.updateUser({data:{baby_name:BABY}});
  closeSheet(); render(); toast('Salvo');
}

/* ===== toast ===== */
let toastT=null;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),1900);}

/* ===== boot ===== */
let currentEmail='';
function showAuth(){document.getElementById('boot').style.display='none';document.getElementById('app').classList.remove('show');document.getElementById('auth').classList.add('show');}
function showApp(session){
  document.getElementById('boot').style.display='none';
  document.getElementById('auth').classList.remove('show');
  document.getElementById('app').classList.add('show');
  currentEmail=session.user.email;
  BABY=(session.user.user_metadata&&session.user.user_metadata.baby_name)||'';
  loadEvents();
}
sb.auth.onAuthStateChange((event,session)=>{
  if(session) showApp(session); else showAuth();
});
(async()=>{
  const {data}=await sb.auth.getSession();
  if(data.session) showApp(data.session); else showAuth();
})();
</script>
