<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Diário do Bebê">
<meta name="theme-color" content="#0d1b2a">
<title>Diário do Bebê</title>
<style>
  :root{
    --bg:#0d1b2a; --bg2:#0a1622; --card:#16263a; --card2:#1d3148;
    --ink:#eef4fb; --muted:#8ea6c0; --line:#26405b;
    --accent:#4f9dff; --accent-d:#3f86e0; --accent-soft:#bcd8ff;
    --sono:#6fa8ff; --sononoite:#8a9bff; --mamada:#e6a866; --refeicao:#86cf73; --despertar:#c79be0;
    --bad:#e5705f; --ok:#e0b056; --mid:#9fce6a; --good:#62c46f;
    --shadow:0 2px 10px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) 0 env(safe-area-inset-left);
    max-width:560px; margin:0 auto; min-height:100vh;
    background-image:radial-gradient(900px 360px at 50% -8%, #16335a 0%, rgba(13,27,42,0) 70%);
    background-attachment:fixed;
  }
  header{padding:16px 16px 10px; position:sticky; top:0; z-index:5; background:linear-gradient(180deg,var(--bg) 72%,rgba(13,27,42,0))}
  .head-row{display:flex; align-items:center; gap:12px}
  .avatar{width:50px; height:50px; border-radius:50%; flex-shrink:0; object-fit:cover; background:var(--card2); border:2px solid var(--accent); display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:700; color:var(--accent-soft); overflow:hidden}
  .head-txt{flex:1; min-width:0}
  .head-txt .greet{font-size:12.5px; color:var(--muted)}
  .head-txt .name{font-size:19px; font-weight:700; line-height:1.15; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .gear{background:none; border:none; font-size:20px; cursor:pointer; padding:4px; color:var(--muted)}
  .wrap{padding:0 16px 120px}

  .tabs{position:fixed; bottom:0; left:0; right:0; max-width:560px; margin:0 auto; display:flex; background:var(--bg2); border-top:1px solid var(--line); padding:6px 6px calc(6px + env(safe-area-inset-bottom)); z-index:10}
  .tabs button{flex:1; background:none; border:none; padding:8px 2px; font-size:11px; color:var(--muted); display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer; font-weight:600}
  .tabs button .ic{font-size:21px; line-height:1}
  .tabs button.active{color:var(--accent)}

  .view{display:none} .view.active{display:block}

  .resumo{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin:4px 0 18px}
  .resumo .r{background:var(--card); border-radius:14px; padding:10px 6px; text-align:center; box-shadow:var(--shadow); border:1px solid var(--line)}
  .resumo .r .n{font-size:21px; font-weight:700; line-height:1; color:var(--ink)}
  .resumo .r .l{font-size:10px; color:var(--muted); margin-top:4px}

  .section-t{font-size:12px; color:var(--muted); font-weight:700; text-transform:uppercase; letter-spacing:.05em; margin:18px 2px 10px}

  .ongoing{border-radius:16px; padding:14px 16px; margin-bottom:10px; display:flex; align-items:center; gap:12px; box-shadow:var(--shadow); color:#fff}
  .ongoing.soneca{background:linear-gradient(135deg,#2f6dc0,#1c4f9e)}
  .ongoing.sono{background:linear-gradient(135deg,#3b3f9e,#272a73)}
  .ongoing.despertar{background:linear-gradient(135deg,#7b4f9e,#5a3475)}
  .ongoing .txt{flex:1}
  .ongoing .txt .a{font-size:13px; opacity:.9}
  .ongoing .txt .b{font-size:19px; font-weight:700; margin-top:2px}
  .ongoing button{background:#fff; color:#1c2a52; border:none; border-radius:12px; padding:11px 14px; font-size:14px; font-weight:700; cursor:pointer; white-space:nowrap}

  .actions{display:grid; grid-template-columns:1fr 1fr; gap:12px}
  .act{background:var(--card); border:1.5px solid var(--line); border-radius:18px; padding:18px 14px; display:flex; flex-direction:column; align-items:flex-start; gap:6px; cursor:pointer; box-shadow:var(--shadow); transition:transform .06s ease; text-align:left; width:100%; color:var(--ink)}
  .act:active{transform:scale(.97)}
  .act .ico{font-size:30px; line-height:1}
  .act .nm{font-size:16px; font-weight:700}
  .act .ds{font-size:12px; color:var(--muted)}
  .act.full{grid-column:1 / -1; flex-direction:row; align-items:center; gap:14px}
  .act.full .ico{font-size:28px}
  .act.sona{border-color:#2d5488} .act.sono{border-color:#34388a} .act.mamada{border-color:#6b4f2e}
  .act.refeicao{border-color:#37562c} .act.despertar{border-color:#553a63}
  .act.on{outline:2px solid var(--accent); outline-offset:0}

  .day-h{font-size:13px; font-weight:700; color:var(--accent-soft); margin:18px 2px 8px; display:flex; align-items:center; gap:8px}
  .day-h .cnt{font-size:11px; color:var(--muted); font-weight:600}
  .ev{background:var(--card); border-radius:14px; padding:11px 13px; margin-bottom:8px; display:flex; align-items:center; gap:11px; box-shadow:var(--shadow); border:1px solid var(--line)}
  .ev .dot{width:34px; height:34px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0}
  .ev .info{flex:1; min-width:0}
  .ev .info .t1{font-size:14.5px; font-weight:600}
  .ev .info .t2{font-size:12px; color:var(--muted); margin-top:1px}
  .ev .time{font-size:13px; color:var(--muted); font-variant-numeric:tabular-nums; white-space:nowrap}
  .ev .edit{background:none; border:none; color:#6f87a3; font-size:16px; padding:4px 2px 4px 6px; cursor:pointer}
  .ev .del{background:none; border:none; color:#5d728c; font-size:18px; padding:4px 2px 4px 4px; cursor:pointer}
  .badge{display:inline-block; font-size:11px; font-weight:700; padding:2px 8px; border-radius:20px; color:#0d1b2a}

  .stat-card{background:var(--card); border-radius:16px; padding:16px; margin-bottom:14px; box-shadow:var(--shadow); border:1px solid var(--line)}
  .stat-card h3{margin:0 0 3px; font-size:15px}
  .stat-card .q{font-size:12.5px; color:var(--muted); margin:0 0 14px}
  .big-num{font-size:30px; font-weight:800; color:var(--accent); line-height:1}
  .big-num small{font-size:14px; color:var(--muted); font-weight:600}
  .bar-row{display:flex; align-items:center; gap:8px; margin:7px 0; font-size:12.5px}
  .bar-row .lbl{width:42px; color:var(--muted); font-variant-numeric:tabular-nums; flex-shrink:0}
  .bar-row .track{flex:1; background:rgba(255,255,255,.07); border-radius:8px; height:18px; overflow:hidden; position:relative}
  .bar-row .fill{height:100%; border-radius:8px; min-width:2px}
  .bar-row .val{width:60px; text-align:right; color:var(--ink); font-weight:600; flex-shrink:0; font-variant-numeric:tabular-nums}
  .hint{font-size:12px; color:var(--muted); margin-top:10px; line-height:1.5}
  .hint b{color:var(--accent-soft)}
  .empty{text-align:center; color:var(--muted); padding:40px 20px; font-size:14px}
  .empty .ico{font-size:40px; display:block; margin-bottom:10px; opacity:.7}

  .overlay{position:fixed; inset:0; background:rgba(5,10,18,.66); display:none; align-items:flex-end; z-index:50}
  .overlay.show{display:flex}
  .sheet{background:var(--bg2); width:100%; max-width:560px; margin:0 auto; border-radius:22px 22px 0 0; padding:18px 18px calc(20px + env(safe-area-inset-bottom)); animation:up .22s ease; border-top:1px solid var(--line)}
  @keyframes up{from{transform:translateY(40px); opacity:.4}to{transform:translateY(0); opacity:1}}
  .sheet h2{margin:2px 0 4px; font-size:18px}
  .sheet .ph{font-size:13px; color:var(--muted); margin:0 0 16px}
  .qbtns{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px}
  .qbtn{border:1.5px solid var(--line); background:var(--card); border-radius:14px; padding:14px 8px; font-size:15px; font-weight:700; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:5px; color:var(--ink)}
  .qbtn .qe{font-size:24px}
  .qbtn:active{transform:scale(.97)}
  .field{margin-bottom:14px}
  .field label{font-size:12px; color:var(--muted); font-weight:600; display:block; margin-bottom:5px}
  .field input{width:100%; border:1.5px solid var(--line); border-radius:12px; padding:12px; font-size:16px; background:var(--card); color:var(--ink); font-family:inherit}
  .field input::placeholder{color:#5d728c}
  .btn{border:none; border-radius:13px; padding:14px; font-size:15px; font-weight:700; cursor:pointer; width:100%}
  .btn.primary{background:var(--accent); color:#06121f}
  .btn.ghost{background:var(--card); color:var(--ink); border:1.5px solid var(--line)}
  .btn.danger{background:#3a1f1d; color:var(--bad)}
  .btn:disabled{opacity:.5}
  .sheet .stack{display:flex; flex-direction:column; gap:9px}

  .toast{position:fixed; bottom:90px; left:50%; transform:translateX(-50%) translateY(20px); background:#06121f; color:#fff; padding:11px 18px; border-radius:30px; font-size:13.5px; font-weight:600; opacity:0; transition:.25s; z-index:60; pointer-events:none; white-space:nowrap; box-shadow:0 6px 20px rgba(0,0,0,.5); border:1px solid var(--line)}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0)}

  #auth,#onboard{display:none; min-height:100vh; flex-direction:column; justify-content:center; padding:24px; max-width:420px; margin:0 auto}
  #auth.show,#onboard.show{display:flex}
  #auth .logo{font-size:48px; text-align:center; margin-bottom:6px}
  #auth h1{font-size:24px; text-align:center; margin:0 0 4px}
  #auth p.s{text-align:center; color:var(--muted); font-size:13.5px; margin:0 0 26px}
  .err{background:#3a1f1d; color:var(--bad); font-size:13px; padding:11px 13px; border-radius:12px; margin-bottom:12px; display:none}
  .err.show{display:block}
  #auth .toggle{text-align:center; margin-top:16px; font-size:13.5px; color:var(--muted)}
  #auth .toggle a{color:var(--accent); font-weight:700; text-decoration:none; cursor:pointer}

  #onboard h1{font-size:23px; text-align:center; margin:0 0 4px}
  #onboard p.s{text-align:center; color:var(--muted); font-size:13.5px; margin:0 0 22px}
  .ph-pick{width:120px; height:120px; border-radius:50%; margin:0 auto 8px; background:var(--card); border:2px dashed var(--line); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; cursor:pointer; overflow:hidden; color:var(--muted)}
  .ph-pick img{width:100%; height:100%; object-fit:cover}
  .ph-pick .pe{font-size:32px}
  .ph-pick .pt{font-size:11px}
  .ph-cap{text-align:center; font-size:12px; color:var(--muted); margin:0 0 20px}

  #app{display:none} #app.show{display:block}
  #boot{min-height:100vh; display:flex; align-items:center; justify-content:center; color:var(--muted); font-size:14px}
</style>
</head>
<body>

<div id="boot">Carregando…</div>

<!-- LOGIN -->
<div id="auth">
  <div class="logo">🍼</div>
  <h1>Diário do Bebê</h1>
  <p class="s" id="auth-sub">Entre pra acessar seus registros</p>
  <div class="err" id="auth-err"></div>
  <div class="field"><label>Email</label><input id="email" type="email" autocomplete="email" placeholder="seu@email.com"></div>
  <div class="field"><label>Senha</label><input id="pass" type="password" autocomplete="current-password" placeholder="mínimo 6 caracteres"></div>
  <button class="btn primary" id="auth-btn" onclick="doAuth()">Entrar</button>
  <div class="toggle" id="auth-toggle">Ainda não tem conta? <a onclick="toggleMode()">Criar conta</a></div>
</div>

<!-- ONBOARDING -->
<div id="onboard">
  <h1>Quem é o seu pequeno?</h1>
  <p class="s">Um nome e um rostinho deixam o diário mais seu.</p>
  <div class="err" id="onb-err"></div>
  <div class="ph-pick" id="phPick" onclick="document.getElementById('phInput').click()">
    <span class="pe">📷</span><span class="pt">adicionar foto</span>
  </div>
  <p class="ph-cap">opcional, fica só na sua conta</p>
  <input type="file" id="phInput" accept="image/*" style="display:none" onchange="pickPhoto(event)">
  <div class="field"><label>Nome do bebê</label><input id="onb-name" placeholder="ex: Tom" autocomplete="off"></div>
  <div class="field"><label>Data de nascimento (opcional)</label><input id="onb-birth" type="date"></div>
  <button class="btn primary" onclick="saveOnboard()">Começar</button>
</div>

<!-- APP -->
<div id="app">
<header>
  <div class="head-row">
    <div class="avatar" id="avatar" onclick="openSettings()">🍼</div>
    <div class="head-txt">
      <div class="greet" id="greet">Olá</div>
      <div class="name" id="title">Diário do Bebê</div>
    </div>
    <button class="gear" onclick="openSettings()">⚙️</button>
  </div>
</header>

<div class="wrap">
  <section class="view active" id="view-registrar">
    <div id="ongoing-slot"></div>
    <div class="section-t">Hoje</div>
    <div class="resumo" id="resumo"></div>
    <div class="section-t">Registrar</div>
    <div class="actions">
      <button class="act full sona" id="btn-soneca" onclick="onSoneca()">
        <span class="ico">😴</span>
        <span><span class="nm" id="soneca-nm">Iniciar soneca</span><br><span class="ds" id="soneca-ds">Cochilo de dia. Marca quando pega no sono</span></span>
      </button>
      <button class="act full sono" id="btn-sono" onclick="onSonoNoite()">
        <span class="ico">🛌</span>
        <span><span class="nm" id="sono-nm">Iniciar sono noturno</span><br><span class="ds" id="sono-ds">A dormida da noite. Encerra de manhã</span></span>
      </button>
      <button class="act mamada" onclick="quickAdd('mamada')">
        <span class="ico">🍼</span><span class="nm">Mamada</span><span class="ds">Registra agora</span>
      </button>
      <button class="act despertar" id="btn-despertar" onclick="onDespertar()">
        <span class="ico">🌙</span><span class="nm" id="desp-nm">Despertar</span><span class="ds" id="desp-ds">Acordou de noite</span>
      </button>
      <button class="act full refeicao" onclick="openRefeicao()">
        <span class="ico">🥣</span>
        <span><span class="nm">Refeição</span><br><span class="ds">Registra a hora e o quanto comeu</span></span>
      </button>
    </div>
  </section>

  <section class="view" id="view-historico"><div id="hist"></div></section>
  <section class="view" id="view-stats"><div id="stats"></div></section>
</div>

<nav class="tabs">
  <button class="active" data-v="registrar" onclick="tab('registrar')"><span class="ic">➕</span>Registrar</button>
  <button data-v="historico" onclick="tab('historico')"><span class="ic">📋</span>Histórico</button>
  <button data-v="stats" onclick="tab('stats')"><span class="ic">📊</span>Estatísticas</button>
</nav>
</div>

<div class="overlay" id="overlay" onclick="if(event.target===this)closeSheet()"><div class="sheet" id="sheet"></div></div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ===== config ===== */
const SB_URL='https://xvydkvqfcgfysrkmzsae.supabase.co';
const SB_KEY='sb_publishable_Iylj-64xnspCSFg-u34jmw_sdWa2TU-';
const sb=supabase.createClient(SB_URL,SB_KEY);

let EV=[], BABY='', PHOTO='', BIRTH='', currentEmail='', mode='login', tmpPhoto='', USERID='';

const TYPES={
  soneca:{nome:'Soneca',emoji:'😴',cor:'var(--sono)',bg:'#1b3559'},
  sono:{nome:'Sono noturno',emoji:'🛌',cor:'var(--sononoite)',bg:'#222a55'},
  mamada:{nome:'Mamada',emoji:'🍼',cor:'var(--mamada)',bg:'#4a331d'},
  refeicao:{nome:'Refeição',emoji:'🥣',cor:'var(--refeicao)',bg:'#243f1d'},
  despertar:{nome:'Despertar',emoji:'🌙',cor:'var(--despertar)',bg:'#3a2647'},
};
const QUAL=[
  {v:0,nome:'Recusou',emoji:'🚫',cor:'var(--bad)'},
  {v:1,nome:'Pouco',emoji:'😕',cor:'var(--ok)'},
  {v:2,nome:'Médio',emoji:'🙂',cor:'var(--mid)'},
  {v:3,nome:'Bem',emoji:'😋',cor:'var(--good)'},
];

/* ===== datas ===== */
function fmtH(ts){const d=new Date(ts);return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
function fmtDur(ms){const m=Math.round(ms/60000);if(m<1)return 'menos de 1 min';if(m<60)return m+' min';const h=Math.floor(m/60);const r=m%60;return h+'h'+(r?' '+r+'min':'');}
function dayKey(ts){const d=new Date(ts);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function dayLabel(ts){
  const d=new Date(ts),t=new Date(),y=new Date(t.getTime()-864e5);
  if(dayKey(ts)===dayKey(t))return 'Hoje';
  if(dayKey(ts)===dayKey(y))return 'Ontem';
  const dias=['domingo','segunda','terça','quarta','quinta','sexta','sábado'];
  const meses=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  return dias[d.getDay()]+', '+d.getDate()+' '+meses[d.getMonth()];
}
function nightKey(ts){return dayKey(ts-12*36e5);}
function fmtClock(min){min=Math.round(((min%1440)+1440)%1440);return String(Math.floor(min/60)).padStart(2,'0')+':'+String(min%60).padStart(2,'0');}
function toLocalInput(ms){const d=new Date(ms);const p=n=>String(n).padStart(2,'0');return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())+'T'+p(d.getHours())+':'+p(d.getMinutes());}
function ageLabel(birth){
  if(!birth)return '';
  const b=new Date(birth+'T00:00:00'), n=new Date();
  let meses=(n.getFullYear()-b.getFullYear())*12+(n.getMonth()-b.getMonth());
  if(n.getDate()<b.getDate())meses--;
  if(meses<0)return '';
  if(meses<1){const dias=Math.floor((n-b)/864e5); const sem=Math.floor(dias/7); return sem<=0?dias+' dias':sem+(sem>1?' semanas':' semana');}
  if(meses<24)return meses+(meses>1?' meses':' mês');
  const anos=Math.floor(meses/12), rm=meses%12;
  return anos+' anos'+(rm?' e '+rm+(rm>1?' meses':' mês'):'');
}
function saudacao(){const h=new Date().getHours(); if(h<12)return 'Bom dia'; if(h<18)return 'Boa tarde'; return 'Boa noite';}

/* ===== auth ===== */
function showErr(m){const e=document.getElementById('auth-err');e.textContent=m;e.classList.add('show');}
function clearErr(){document.getElementById('auth-err').classList.remove('show');}
function toggleMode(){
  mode=mode==='login'?'signup':'login';
  document.getElementById('auth-sub').textContent=mode==='login'?'Entre pra acessar seus registros':'Crie sua conta pra começar';
  document.getElementById('auth-btn').textContent=mode==='login'?'Entrar':'Criar conta';
  document.getElementById('auth-toggle').innerHTML=mode==='login'
    ?'Ainda não tem conta? <a onclick="toggleMode()">Criar conta</a>'
    :'Já tem conta? <a onclick="toggleMode()">Entrar</a>';
  clearErr();
}
async function doAuth(){
  clearErr();
  const email=document.getElementById('email').value.trim();
  const pass=document.getElementById('pass').value;
  if(!email||!pass){showErr('Preencha email e senha.');return;}
  const btn=document.getElementById('auth-btn'); btn.disabled=true; btn.textContent='Aguarde…';
  let res;
  if(mode==='signup') res=await sb.auth.signUp({email,password:pass});
  else res=await sb.auth.signInWithPassword({email,password:pass});
  btn.disabled=false; btn.textContent=mode==='login'?'Entrar':'Criar conta';
  if(res.error){
    const m=res.error.message||'';
    if(/Invalid login/i.test(m))showErr('Email ou senha incorretos.');
    else if(/already registered/i.test(m))showErr('Esse email já tem conta. Tente entrar.');
    else if(/at least 6/i.test(m))showErr('A senha precisa de no mínimo 6 caracteres.');
    else showErr(m);
  }
}
async function logout(){await sb.auth.signOut(); closeSheet();}

/* ===== foto ===== */
function compressImage(file,max,q){
  return new Promise(res=>{
    const img=new Image();
    img.onload=()=>{
      let w=img.width,h=img.height;
      if(w>h){if(w>max){h=Math.round(h*max/w);w=max;}}
      else{if(h>max){w=Math.round(w*max/h);h=max;}}
      const c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      res(c.toDataURL('image/jpeg',q));
    };
    img.onerror=()=>res('');
    img.src=URL.createObjectURL(file);
  });
}
async function pickPhoto(ev){
  const f=ev.target.files[0]; if(!f)return;
  const data=await compressImage(f,256,0.72);

async function loadEvents(){
  const {data,error}=await sb.from('events').select('*').order('ts',{ascending:false});
  if(error){toast('Erro ao carregar');console.error(error);return;}
  EV=data.map(r=>({id:r.id,type:r.type,ts:new Date(r.ts).getTime(),end:r.end_ts?new Date(r.end_ts).getTime():null,quality:r.quality,note:r.note||''}));
  render();
}
function activeSoneca(){return EV.find(e=>e.type==='soneca'&&!e.end);}
function activeSono(){return EV.find(e=>e.type==='sono'&&!e.end);}
function activeDespertar(){return EV.find(e=>e.type==='despertar'&&!e.end);}

async function onSoneca(){
  const a=activeSoneca();
  if(a){const {error}=await sb.from('events').update({end_ts:new Date().toISOString()}).eq('id',a.id); if(error){toast('Erro');return;} toast('Soneca: '+fmtDur(Date.now()-a.ts));}
  else{const {error}=await sb.from('events').insert({type:'soneca',ts:new Date().toISOString(),end_ts:null}); if(error){toast('Erro');return;} toast('Soneca iniciada 😴');}
  await loadEvents();
}
async function onSonoNoite(){
  const a=activeSono();
  if(a){
    // se um despertar estiver aberto, é o acordar da manhã: descarta pra não contar como despertar noturno
    const d=activeDespertar();
    if(d&&d.ts>=a.ts){await sb.from('events').delete().eq('id',d.id);}
    const {error}=await sb.from('events').update({end_ts:new Date().toISOString()}).eq('id',a.id);
    if(error){toast('Erro');return;}
    const L=sonoLiquido({ts:a.ts,end:Date.now()});
    toast('Bom dia! Sono líquido: '+fmtDur(L.net));
  } else {
    const {error}=await sb.from('events').insert({type:'sono',ts:new Date().toISOString(),end_ts:null});
    if(error){toast('Erro');return;} toast('Sono noturno iniciado 🛌');
  }
  await loadEvents();
}
async function onDespertar(){
  const d=activeDespertar();
  if(d){const {error}=await sb.from('events').update({end_ts:new Date().toISOString()}).eq('id',d.id); if(error){toast('Erro');return;} toast('Voltou a dormir após '+fmtDur(Date.now()-d.ts));}
  else{const {error}=await sb.from('events').insert({type:'despertar',ts:new Date().toISOString(),end_ts:null}); if(error){toast('Erro');return;} toast('Acordou de noite 🌙');}

}

  let html=`<h2>${t.emoji} Editar ${t.nome.toLowerCase()}</h2>

async function saveEdit(id,isSession,isRef){
  const tsV=document.getElementById('ed-ts').value;
  if(!tsV){toast('Coloque o horário');return;}
  const patch={ts:new Date(tsV).toISOString()};
  if(isSession){
    const endV=document.getElementById('ed-end').value;
    if(endV){
      if(new Date(endV).getTime()<new Date(tsV).getTime()){toast('O fim não pode ser antes do início');return;}
      patch.end_ts=new Date(endV).toISOString();
    } else patch.end_ts=null;
  }
  if(isRef){patch.quality=(edQ==null?null:edQ); patch.note=document.getElementById('ed-note').value.trim();}
  const {error}=await sb.from('events').update(patch).eq('id',id);
  if(error){toast('Erro ao salvar');console.error(error);return;}
  closeSheet(); toast('Atualizado 💙'); await loadEvents();
}

/* despertares fechados dentro de uma noite, e sono líquido */
function despertaresNa(sono){
  const fim=sono.end||Date.now();
  return EV.filter(e=>e.type==='despertar'&&e.end&&e.ts>=sono.ts&&e.ts<=fim);
}
function sonoLiquido(sono){
  const gross=(sono.end||Date.now())-sono.ts;
  const ds=despertaresNa(sono);
  const awake=ds.reduce((s,d)=>s+(d.end-d.ts),0);
  return {gross,awake,net:Math.max(0,gross-awake),n:ds.length};
}

function bar(label,pct,val,cor){return `<div class="bar-row"><div class="lbl">${label}</div><div class="track"><div class="fill" style="width:${pct}%;background:${cor}"></div></div><div class="val">${val}</div></div>`;}
function card(emoji,titulo,pergunta,inner){return `<div class="stat-card"><h3>${emoji} ${titulo}</h3><p class="q">${pergunta}</p>${inner}</div>`;}

function statSonoNoite(){
  const noites=EV.filter(e=>e.type==='sono'&&e.end);
  if(!noites.length)return card('🛌','Sono da noite','Quanto ele dorme à noite, de fato?','<div class="hint">Encerre um sono noturno (botão "Começar o dia") pra ver os padrões.</div>');
  const Ls=noites.map(sonoLiquido);
  const avgNet=Ls.reduce((s,L)=>s+L.net,0)/Ls.length;
  const avgAwake=Ls.reduce((s,L)=>s+L.awake,0)/Ls.length;
  // hora média de deitar (ajusta madrugada) e de acordar
  const bedMin=noites.map(e=>{const d=new Date(e.ts);let m=d.getHours()*60+d.getMinutes();if(d.getHours()<12)m+=1440;return m;});
  const wakeMin=noites.map(e=>{const d=new Date(e.end);return d.getHours()*60+d.getMinutes();});
  const avgBed=bedMin.reduce((s,v)=>s+v,0)/bedMin.length;
  const avgWake=wakeMin.reduce((s,v)=>s+v,0)/wakeMin.length;
  const inner=`<div class="big-num">${fmtDur(avgNet)} <small>por noite (líquido)</small></div>
    <div class="hint">Já descontando os despertares (em média ${fmtDur(avgAwake)} acordado por noite). Base de <b>${noites.length} noite${noites.length>1?'s':''}</b>.</div>
    <div class="section-t" style="margin:14px 2px 6px">Ritmo da noite</div>
    <div class="hint" style="margin-top:4px">Costuma deitar por volta das <b>${fmtClock(avgBed)}</b> e começar o dia às <b>${fmtClock(avgWake)}</b>.</div>`;
  return card('🛌','Sono da noite','Quanto ele dorme à noite, de fato?',inner);
}
function statDespertares(){
  const desp=EV.filter(e=>e.type==='despertar');
  if(!desp.length)return card('🌙','Despertares noturnos','Quantas vezes acorda, e quanto demora pra voltar?','<div class="hint">Sem despertares registrados ainda.</div>');
  const byNight={}; desp.forEach(e=>{const k=nightKey(e.ts);byNight[k]=(byNight[k]||0)+1;});
  const noites=Object.keys(byNight).sort(); const total=desp.length,nNoites=noites.length; const media=total/nNoites;
  const closed=desp.filter(e=>e.end);
  const avgRet=closed.length?closed.reduce((s,e)=>s+(e.end-e.ts),0)/closed.length:0;
  const byHour={}; desp.forEach(e=>{const h=new Date(e.ts).getHours();byHour[h]=(byHour[h]||0)+1;});
  const maxH=Math.max(...Object.values(byHour));
  const horas=Object.keys(byHour).map(Number).sort((a,b)=>a-b);
  const bars=horas.map(h=>bar(String(h).padStart(2,'0')+'h',Math.round(byHour[h]/maxH*100),byHour[h]+'×','var(--despertar)')).join('');
  const last=noites.slice(-5).map(k=>byNight[k]);
  const inner=`<div class="big-num">${media.toFixed(1)} <small>despertares / noite</small></div>
    <div class="hint">Base de <b>${nNoites} noite${nNoites>1?'s':''}</b> (${total} no total). Últimas: ${last.join(', ')}.</div>
    ${closed.length?`<div class="hint">Demora em média <b>${fmtDur(avgRet)}</b> pra voltar a dormir.</div>`:''}
    <div class="section-t" style="margin:16px 2px 8px">Horários que mais acorda</div>${bars}`;
  return card('🌙','Despertares noturnos','Quantas vezes acorda, e quanto demora pra voltar?',inner);
}
function statRefeicoes(){
  const ref=EV.filter(e=>e.type==='refeicao');
  if(!ref.length)return card('🥣','Aceitação das refeições','Em quais horários come melhor?','<div class="hint">Sem refeições registradas ainda.</div>');
  const byHour={}; ref.forEach(e=>{const h=new Date(e.ts).getHours();(byHour[h]=byHour[h]||[]).push(e.quality);});
  const horas=Object.keys(byHour).map(Number).sort((a,b)=>a-b);
  let best={h:null,avg:-1};
  const bars=horas.map(h=>{const arr=byHour[h];const avg=arr.reduce((s,v)=>s+v,0)/arr.length;if(avg>best.avg){best={h,avg,n:arr.length};}const q=QUAL[Math.round(avg)]||QUAL[0];return bar(String(h).padStart(2,'0')+'h',Math.round(avg/3*100),q.emoji+' '+arr.length+'×',q.cor);}).join('');
  const avgAll=ref.reduce((s,e)=>s+e.quality,0)/ref.length; const qAll=QUAL[Math.round(avgAll)];
  const inner=`<div class="hint" style="margin:0 0 12px">No geral come <b>${qAll.emoji} ${qAll.nome.toLowerCase()}</b> (${ref.length} refeições). Barra cheia = comeu bem.</div>
    ${bars}<div class="hint">Melhor horário até agora: <b>${best.h!=null?String(best.h).padStart(2,'0')+'h':'—'}</b>.</div>`;
  return card('🥣','Aceitação das refeições','Em quais horários come melhor?',inner);
}
function statSonecas(){
  const son=EV.filter(e=>e.type==='soneca'&&e.end);
  if(!son.length)return card('😴','Sonecas do dia','Melhores horários e tempo médio de cochilo','<div class="hint">Encerre algumas sonecas (botão "Acordou da soneca") pra ver os padrões.</div>');
  const durs=son.map(e=>e.end-e.ts); const mediaMs=durs.reduce((s,v)=>s+v,0)/durs.length;
  const byHour={}; son.forEach(e=>{const h=new Date(e.ts).getHours();(byHour[h]=byHour[h]||[]).push(e.end-e.ts);});
  const horas=Object.keys(byHour).map(Number).sort((a,b)=>a-b);
  const maxAvg=Math.max(...horas.map(h=>byHour[h].reduce((s,v)=>s+v,0)/byHour[h].length));
  let best={h:null,avg:0};
  const bars=horas.map(h=>{const arr=byHour[h];const avg=arr.reduce((s,v)=>s+v,0)/arr.length;if(avg>best.avg){best={h,avg,n:arr.length};}return bar(String(h).padStart(2,'0')+'h',Math.round(avg/maxAvg*100),fmtDur(avg),'var(--sono)');}).join('');
  const inner=`<div class="big-num">${fmtDur(mediaMs)} <small>por soneca</small></div>
    <div class="hint">Média de <b>${son.length} soneca${son.length>1?'s':''}</b> de dia. Barras = duração média por hora de início.</div>
    <div class="section-t" style="margin:16px 2px 8px">Duração por hora de início</div>${bars}
    <div class="hint">Soneca mais longa começa por volta das <b>${best.h!=null?String(best.h).padStart(2,'0')+'h':'—'}</b> (${fmtDur(best.avg)} em média).</div>`;
  return card('😴','Sonecas do dia','Melhores horários e tempo médio de cochilo',inner);
}
function statMamadas(){
  const mam=EV.filter(e=>e.type==='mamada'); if(!mam.length)return '';
  const byDay={}; mam.forEach(e=>{const k=dayKey(e.ts);byDay[k]=(byDay[k]||0)+1;});
  const dias=Object.keys(byDay); const media=mam.length/dias.length;
  const inner=`<div class="big-num">${media.toFixed(1)} <small>mamadas / dia</small></div>
    <div class="hint">Média de <b>${dias.length} dia${dias.length>1?'s':''}</b> (${mam.length} no total).</div>`;
  return card('🍼','Mamadas','Quantas por dia, em média?',inner);
}

/* ===== sheet / settings ===== */
function showSheet(html){document.getElementById('sheet').innerHTML=html;document.getElementById('overlay').classList.add('show');}
function closeSheet(){document.getElementById('overlay').classList.remove('show');}
function openSettings(){
  const html=`
    <h2>⚙️ Configurações</h2>
    <p class="ph">Conta: ${currentEmail||'—'}</p>
    <div style="display:flex;justify-content:center;margin-bottom:6px">
      <div class="avatar" id="set-av" style="width:84px;height:84px;font-size:34px" onclick="document.getElementById('phInput').click()"></div>
    </div>
    <p style="text-align:center;font-size:12px;color:var(--muted);margin:0 0 16px">toque pra trocar a foto</p>
    <div class="field"><label>Nome do bebê</label><input id="bname" value="${BABY||''}" placeholder="ex: Tom"></div>
    <div class="field"><label>Data de nascimento</label><input id="bbirth" type="date" value="${BIRTH||''}"></div>
    <div class="stack">
      <button class="btn primary" onclick="saveProfile()">Salvar</button>
      <button class="btn ghost" onclick="logout()">Sair da conta</button>
      <button class="btn ghost" onclick="closeSheet()">Fechar</button>
    </div>
    <div class="hint" style="margin-top:14px">${EV.length} registros na sua conta, salvos na nuvem.</div>`;
  showSheet(html);
  tmpPhoto=PHOTO||'';
  setAvatar(document.getElementById('set-av'));
}
async function saveProfile(){
  BABY=document.getElementById('bname').value.trim()||BABY;
  BIRTH=document.getElementById('bbirth').value||'';
  PHOTO=tmpPhoto||PHOTO;
  await saveProfileRow();
  closeSheet(); render(); toast('Salvo 💙');
}
async function saveProfileRow(){
  const {error}=await sb.from('profiles').upsert({user_id:USERID,baby_name:BABY,baby_birth:BIRTH||null,baby_photo:PHOTO,updated_at:new Date().toISOString()});
  if(error){console.error(error); toast('Erro ao salvar perfil');}
}

/* ===== toast ===== */
let toastT=null;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),1900);}

/* ===== boot ===== */
async function loadProfile(){
  const {data,error}=await sb.from('profiles').select('*').eq('user_id',USERID).maybeSingle();
  if(error)console.error(error);
  const m=data||{};
  BABY=m.baby_name||''; BIRTH=m.baby_birth||''; PHOTO=m.baby_photo||'';
}
function revealApp(){
  document.getElementById('boot').style.display='none';
  document.getElementById('auth').classList.remove('show');
  document.getElementById('onboard').classList.remove('show');
  document.getElementById('app').classList.add('show');
  loadEvents();
}
function showAuth(){document.getElementById('boot').style.display='none';document.getElementById('app').classList.remove('show');document.getElementById('onboard').classList.remove('show');document.getElementById('auth').classList.add('show');}
async function enter(session){currentEmail=session.user.email; USERID=session.user.id; await loadProfile(); if(!BABY)showOnboard(); else revealApp();}
sb.auth.onAuthStateChange((event,session)=>{ if(session)enter(session); else showAuth(); });
(async()=>{const {data}=await sb.auth.getSession(); if(data.session)enter(data.session); else showAuth();})();
</script>
